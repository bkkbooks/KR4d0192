body:
  text: 茶山集别集類三宋提要臣等謹案茶山集十巻宋曽幾撰幾字吉甫贑縣人徙居河南以兄弼䘏恩授將仕郎試吏部優等賜上舍出身授校書郎髙宗朝厯官江西浙西提刑忤秦檜去位僑寓上饒茶山寺自號茶山居士檜死召為秘書少監權禮部侍郎提舉玉隆觀致仕卒諡文清陸游為作墓誌云公治經學道之餘發於文章而詩尤工以杜甫黄庭堅為宗魏慶之詩人玉屑則云茶山之學出于韓子蒼其說小異然韓駒雖蘇氏之徒而名列江西詩派中其格法實近于黄殊塗同歸實亦一而已矣後幾之學傳于陸游加以研練面目畧殊遂為南渡之大宗詩人玉屑載趙庚夫題茶山集曰清于月白初三夜淡似湯烹第一泉咄咄逼人門弟子劍南已見一燈傳其句律淵源固灼然可考也又游跋幾奏議稿曰紹興未先生居㑹稽禹跡精舍某自勅局歸無三日不進見見必聞憂國之言先生時年過七十聚族百口未嘗以為憂憂國而已据此則幾之一飯不忘君殆與杜甫之忠愛等故發之文章具有根柢不得僅以詩人目之求諸字句間矣墓誌稱有文集三十卷易釋象五卷易釋象已不傳文集則書録解題及宋史藝文志均作十五卷是當時已佚其半自明以來并十五巻亦佚僅僅散見各書偶存一二兹從永樂大典中搜採編輯勒為八巻凡得古今體五百五十八首雖不足盡幾之長然較劉克莊後村詩話所記九百一十篇之數所佚者不過三百五十二篇耳殘膏賸馥要足沾丐無窮也乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四茶山集目錄别集類三宋巻一五言古詩三十二首巻二五言古詩四十六首巻三七言古詩三十一首巻四五言律詩一百二十八首五言排律五首巻五七言律詩八十二首巻六七言律詩六十四首巻七五言絶句五十三首六言絶句七首巻八七言絶句一百十三首
