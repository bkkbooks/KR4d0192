body:
  text: 茶山集巻六宋曾幾撰七言律詩上元日大雪句芒整轡浹辰間雪片相隨大可觀挑菜園林有餘潤燒燈庭院不勝寒柳條弄色政爾好梅蘂飄香殊未闌便似落花飛絮去直疑春事併衰殘寒食只旬日間風雨不已年光胡不少留連熟食清明又眼前敢望深宫傳蠟燭可堪小市禁炊煙滿城風雨無桮酒故國松楸欠紙錢老病心情冷時節只將幽策替幽禪寒食與客遊東湖官曹顔狀滿塵埃負郭陂湖眼為開春色少留如過客賞心多病只寒灰黄童白叟喜相告皁葢朱幡能一來日暮遊人歸去盡沙頭鷗鷺與徘徊久雨誰言春雨散如絲一月埀空似綆縻雲去雲來何日了花開花落不曾知直愁排蕩根荄盡安用栽培桃李為政恐東君不無意十分姸暖乞酴釄上方前朝蘭若舊聞名絶頂禪房日月鄰木潤山輝應有物錫飛桮渡不無神郊坰行去僅百里郡郭往來今十春未踏青雲梯一級㑹當齊侶箇中人遊姑蘇張氏園二首郭内名園舊所聞扶攜老稺及良辰重重碧樹深留客一一華堂極可人綠暗池塘初破夏清和時節尙關春憑誰說與滄浪水早晩芒鞋去問津雨近黄梅細不聞破牕夜夜㸔星辰園林如許不行樂魚鳥有知應笑人盛喜晴天容卜晝絶憐小塢解藏春何妨著我閒田地坐看埀楊夾廣津遊橋南竹園杖屨橋南訪此君别君安否斷知聞苦遭積雨來為祟政得新晴為解紛直幹萬餘森碧玉高標一半入青雲人言歳暮於吾子踏雪相看未當勤遊滄浪亭詩丘壑園林得我驚茲遊便足了餘生飛來嶓冢横空翠流出滄浪徹底清探討不遺幽士力招邀難得主人情波間漁父還知否已挂朝冠不濯纓遊虎丘誰能竟日把書看蕩槳扶笻十里間未辦深藏豹林谷不妨時到虎丘山秋來千頃境絶麗寺有千頃軒取東坡詩雲水麗千頃之句老矣北牕人極閒余家居書齋以北牕名之取陶淵明語忽見題名在塵壁餘生那得許堅頑庚辰歳與榮茂實凌明甫林仲純沼長老㑹致爽堂題名今惟明甫與余在耳過松江家在朱簾畫舫中今朝誤入水精宫江澄不起無風浪天遠長埀未霽虹酒熟桮盤供雪鱠詩成島嶼落霜楓帆來帆去何曾歇萬頃煙波屬釣翁信衢道中溪流不通全家遵陸客情厭楚卻思吳白鷺汀洲政起予渴雨溪流妨進艇得晴山路稱騎驢滿林霜著春相似半嶺雲横雪不如匹馬四方男子事饒陽況不是吾廬風月堂二首西湖地僻少人知隱吏官曹占作池浩蕩芙蕖風過夜扶疎楊柳月明時雖多不用一錢買縱少足供千首詩但使尊中深貯此巵刀細薄可無飢案巵刀二字未詳今無别本可校姑仍其舊青羅熨鏡正揩磨上有虚堂發興多大熱端能排酷吏廣寒只合在嫦娥又成畫舫珠簾去可奈紅妝翠蓋何縱使曲肱無别夢一尊風月弄婆娑卽事野寺山家兩寂然小牕下有白頭禪微風不動爐煙直永日方中樹影圓隱几讀書長竟夕閉門覓句可忘年幸無駟馬高車客觸忤幽人到眼邊出嶺乞得身閒又禦魑干戈瘴癘兩危機三年似渉新冰過十口今持舊璧歸天靜不憂鴻北向月明休詠鵲南飛只應黄帽青鞋底城郭人民有是非詠城居盤碧棲寒結露居虛封水户食芙蕖錦雲長日來無定蘿月通宵色有餘靜拂琴書尋密契時因齋戒具甘蔬門穿藜徑裁塵跡車馬無煩問廣閭秋日郊居眼前百種併愁予風日凄凄野外居落鴈沙邊水清淺蛻蟬枝上葉蕭疎一身病著殘光景盡室貧依古屋廬物色情懷兩岑寂更無人問客何如避寇遷居郭内風雨凄然鄭顧道餉酒煙雨昏昏一月梅全家避賊寄城隈欲尋碧落侍郎去遽沐青州從事來令我妻孥爭洗盞想公伯仲政傳桮安能鬱鬱久居此且傍茶山松徑回寓居吳興相對真成泣楚囚遂無末策到神州但知遶樹如飛鵲不解營巢似拙鳩江北江南猶斷絶秋風秋雨敢淹留低囘又作荆州夢落日孤雲始欲愁寓教寺東軒誰將老境覓菟裘聊與瞿曇共一丘青士無多自蕭散紫君雖小亦風流要須憩寂有茅宇何以落成惟茗甌穩看林間上番筍惜無餘地可通幽宜興卲智卿天遠堂目極雲沙靜渺然卲卿風月過年年鴈行滅沒山横晩漁艇空濛水接天南國棠陰春寂寂東風瓜蔓日緜緜問君許作鄰翁否陽羨溪邊卽買田發宜興老境埀埀六十年又將家上鐡頭船客留陽羨秖三月歸去玉溪無一錢觀水觀山都廢食聽風聴雨不妨眠從今布韤青鞵夢不到張公卽善權壬戌歳除作明朝六十歳矣禪室蕭然丈室空薰銷火冷閉門中光陰又似燭見跋學問只如船逆風一歳臨分驚老大五更相守笑兒童休言四十明朝過看取霜髯六十翁謁靈康廟玉霄峯外海西頭卽是衰翁所領州雲水茫茫長發興春山疊疊未生愁舊時英物餘千載勝地叢祠尙一丘苦雨凄風莫為崇與君同樂亦同憂登玉霄亭老荷君恩付赤城瘦笻扶上玉霄亭懸知地接溟溟海坐見天横兩兩星作賦興公虛想像謫官司戸實飄零衰翁何幸分符竹一覽東吳未了青竹軒小睡好竹迷時手自栽一軒寒碧謝塵埃清風政為我輩設小睡忽從何許來已用官茶麾得去莫因家釀挽令回呼兒靜掃黄葉徑吾與此君俱快哉竹軒睡起詩和者旣多輒復次韻雨中好竹不難栽雨後清無一㸃埃政有賢人林下集何嘗俗客洞中來稽山老幹應相憶茂苑新梢未遣囘歸去南軒曲肱夢蔥蔥鬱鬱氣佳哉余㑹稽所寓南軒種竹甚盛曾表勲畫屏筆端水遠又山長瀟灑吾宗白面郎薺樹煙中分瑣細葉舟沙外見微茫不宜朝士聴雞枕政愜幽人夢蝶牀卻恐非關毫素事此身元住玉溪旁程吉老撫幹以英石見遺層疊可愛報之以此几淨牕明丈室間炷香危坐不開關如何密密深深地忽有層層疊疊山珍重故人初入手攜持使我得怡顔從今石友常相對世上交遊費往還雪後梅花盛開折置燈下滿城桃李望東君破臘江梅未上春牕几數枝逾靜好園林一雪倍清新已無妙語形容汝不用幽香觸撥人迨此暇時當舉酒明朝風雨恐傷神瓶中梅小牕水冰青琉璃梅花横斜三四枝若非風日不到處何得色香如許時神情蕭散林下氣玉雪清瑩閨中姿陶泓毛穎果安用疎影寫出無聲詩返魂梅徑菊庭蘭日夜摧禪房未合有江梅香今政作依稀似花乃能令頃刻開笑說巫陽真浪下寄聲驛使未須來為君浮動黄昏月挽取林逋句法囘諸人見和返魂梅再次韻蠟炬高花半欲摧斑斑小雨學黄梅有時燕寢香中坐如夢前村雪裏開披拂故令攜袖滿横斜便欲映牕來重簾幽戸深深閉亦恐風飄不得囘鄭侍郎折贈白芍藥奇葩天遣殿芳叢一朶瑶臺月下逢黄遶腰間空自貴紅潮頰上莫爭穠如何風日許姸暖更著衣裳能疊重定是揚州玉樓子略無佳句與形客曾宏甫分餉洞庭柑黄柑送似得嘗新坐我松江震澤濵想見霜林三百顆夢成羅帕一雙珍流泉噴霧真宜酒帶葉連枝絶可人莫向君家樊素口瓠犀微齼遠山顰齼初舉切齭同齒傷醋也又音所福帥張淵道送荔子豈無重碧實瓶罍難得輕紅薦一桮千里人從閩嶺出三年公送荔枝來玉為肌骨凉無汗雲作衣裳皺不開莫訝關情向尤物厭看綠李與楊梅荔子異方風物鬢成斑荔子嘗新得破顔蘭蕙香浮襟解後雪冰膚在酒酣間絶知高味傾瑤柱未覺豐肌病玉環似是看來終不近寄聲龍目儘追攀又詠荔子百年中半飽聞渠名下親承果不虛可愛風流元有種自然富貴乃其餘肯隨妃子紅塵驛甘伴先生白鶴居可惜不經山谷賞照紅鴨綠定何如吳傅朋送惠山泉兩瓶竝所書石刻錫谷寒泉雙玉瓶故人捐惠意非輕疾風驟雨湯聲作淡月疎星茗事成新歳頭綱須擊拂舊時水遞費經營銀鉤蠆尾增奇麗併得晴牕兩眼明李相公餉建溪新茗奉寄一書說盡故人情閩嶺春風入戸庭碾處曾看眉上白茶家云碾茶須令碾者眉白乃已分時為見眼中青飯羮正晝成空洞枕簟通宵失杳冥無奈筆端塵俗在更呼活火發銅瓶鄭顧道招賞瑞香山城底處不春風未似畱賓鄭驛中家釀篘成玉池水玉池水鄭氏酒名檻花移得錦薰籠已將故事來招我不著直略切新詩去惱公去年諸公皆有詩促公賞花事從此溪南溪北路桃蹊一任雨繁紅得瑞香于四明錦樹團欒海角州移春檻裏見風流兩三翠蓋張前面千百香囊綴上頭絶代紅梅相對好妒人山麝莫來休衰翁若被兒童問入眼還曾有此不張耆年教授置酒官舍環碧散歩上園煎桃花茶何許清尊對物華廣文官舍似僧家向人只合供談笑領客猶能辦咄嗟光動桮盤環碧水香隨珠履上園花公如不厭過從數但煮東坡所種茶郡中禁私釀嚴甚戲作結交歡伯無他腸小槽竊比顧建康此身忽墮禁酒國何路得到無功鄉官酤快甚夏酌水齋釀愜于冬飲湯客來且復置是事北焙薦椀春風香時建上送新茗榮茂實侍郎餉家釀風牕雪屋坐昏晨一老江湖寂寞濱解戰充虚惟有酒絶甘分少不無人交情好在篔簹谷茂實所居御筆賜名筠谷臘味持來麴米春便覺寒家生暖熱故知客裏未全貧家釀紅酒美甚戲作麴生奇麗乃如許酒母穠華當若何向人自作醉時面遣我寧不蒼顔酡得非琥珀所成就更有丹砂相盪磨可憐老杜不對汝但愛引頸舟前鵝食筍花事䦨珊竹事初一番風味殿春蔬龍蛇戢戢風雷後虎豹斑斑霧雨餘但使此君常有子不憂每食歎無魚丁寧下番須留取障日遮風卻要渠戲作盆池四于和青堂陂湖春盡水茫茫收拾波濤入小塘睡起微凉馥荷氣雨餘斜日麗萍光聊為堂下龜魚主少退階前鴈鶩行只欠盆行數峯在併持小樹作青蒼秘省避暑抵暮乃出蝸廬何以度袢延竟日蓬山一洗湔陰翳樹林無六月風涼殿閣是諸天政須深隱似𤣥豹不用懷歸如杜鵑咄咄逼人牛馬走夜牕妨我枕書眠復熱墨雲行雨併成空突兀彤雲在眼中瓜李不禁如許熱蒲葵能得幾多風通宵看月坐還臥竟日追凉西復東囘首本無寒暑地聴渠亭午汗珠融兒輩次復熱詩韻再次韻示之蓐收何在渺層空三伏炎蒸尙未中況復今宵無好月不知底處有清風看雲暮暮不為雨畏日朝朝還自東憶昔給孤園裏夢褰裳覓路踏泥融八月十五夜月二首玉露金波不可孤相瞻今夕定何如氛埃未淨雨湔洗陰翳小留風掃除丹桂看來元了了白榆種得許疎疎一桮濁酒非難事未有新詩報答渠雲日晶熒固自佳幽人有待至昏鴉遠分嵒際松楓樹復亂洲前蘆荻花曳履商聲憐此老倚樓長笛問誰家霜螯玉柱姚江上作意三年醉月華重陽老去長爭一寸陰良辰物色負幽襟中秋素月偏離畢九日黄花未散金蓓蕾不妨供小摘茱萸聊復伴孤斟重陽何必今朝是從此籬邊日訪尋十月一日屋角羲娥轉兩輪今朝水帝又司辰山家嘗稻知良月野徑尋梅見小春一歳坐看除得盡百年正與死為鄰誰能思許無窮事閉閤開爐但飮醇長至日述懐兼寄十七兄老來愈覺白駒忙眼看重陽又一陽心似死灰飛不起技如寒日短中長厭看賓客空投謁強對妻孥略舉觴回首山陰酬勸地應憐鴻鴈不成行辛未年長至日在紹興侍兄宴㑹雪作臥聞微霰卻無聲起看階前又不能一夜紙牕明似月多年布被冷于氷履穿過我柴門客笠重歸來竹院僧三白自佳晴亦好諸山粉黛見層層雪晴衾裯一夜冷于冰雪事心知作音佐得成自起穴牕看不見卻來攲枕聴無聲下牀走報童心喜開戸驚呼老眼明晴日埀簷白銀塔怪奇亦復可憐生十二月六日大雪薄晩蓬山下直餘笑看六出㸃衣裾絮飛簾外無縈絆花落階前不掃除松鬛埀身全類我竹頭搶地最憐渠短檠便可捐牆角剩有牕光映讀書歳盡漏箭更籌日夜催萬牛不挽白駒囘梅花雪片歳華盡萱草柳條春鼎來案陸游詩新春鼎鼎來原本陶潛詩鼎鼎百年内此以春鼎對歳華殆割用之病裏詩書元不讀貧中尊俎未嘗開年光似此真虛擲請以丹心學死灰致仕妻孥挽我奉眞祠老子婆娑正坐誰受祿功無一毫末休官事有十年遲尚容款曲懸車地絶勝倉皇易簀時請祝聖人千萬壽小臣何敢望期頤訓詞有享壽期頤之語癸未八月十四日至十六夜月色皆佳年年歳歳望中秋歳歳年年霧雨愁涼月風光三夜好老夫懷抱一生休明時諒費銀河洗缺處應須玉斧修京洛胡塵滿人眼不知能似浙江不自號在家衲子絶勝人間萬戸侯不稱俗士不緇流又隨拄杖去行腳未辦把茅來蓋頭但使宗風嗣龐藴誰能佛事覺裴休秖應除卻閒名字一聽人呼作馬牛茶山集巻六
