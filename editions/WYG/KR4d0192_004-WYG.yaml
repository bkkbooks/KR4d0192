body:
  text: 茶山集巻四宋曾幾撰五言律詩立春十載東都客春盤種種春翠看蔬甲小黄愛韭苗新流落成吾老蕭疎對此辰睦隣如有使傳語大梁人春日二首今日知何日東風破臘來寒隨邊騎去春與漢軍囘彩勝參差翦蔬盤飣餖開不妨時節好年事豈禁催期頤三萬日政爾亦無多佳節已如許衰年將若何雨風增落寞戚友斷經過問訊庖廚内猶堪一洗磨春日卽事次韻穠李花如許殊勝灼灼紅只言開似雪不道去隨風勝日從吾黨衰年念此翁詩情猶可强桮勺不能同雨二首秋冬久不雨氣濁喜雲生麥隴崇朝潤茅檐徹夜聲初來斷幽徑漸密雜疎更賴有牆隂薺離離已可烹薄晩初霑洒清晨更慘悽魚寒拋餌去鴉濕就簷棲幽澗濺濺溜長堤淺淺泥一杯持自賀吾事在鋤犁夕雨屣履行莎徑移牀臥草亭風聲雜溪瀨雨氣挾龍腥􅋫􅋫空中電昏昏雲罅星徂年又如許吾鬢得長青雨夜一雨遂通夕安眠失百憂牕扉淡欲曉枕簟冷生秋畫燭爭碁道金尊數酒籌依然錦城夢忘卻在南州仲夏細雨霢霂無人見芭蕉報客聞潤能添硯滴細欲亂爐薫竹樹驚秋半衾裯愜夜分何當一傾倒趁取未歸雲憫雨梅子黄初徧秧鍼緑未抽若無三日雨那復一年秋薄晩看天意今宵破客愁不眠聽竹樹還有好音不郡中迎懷玉山應眞請雨得之未霑足憫雨連三月為霖抵萬金小埀開士手足慰老農心果欲千倉積猶須一尺深病夫渾不聽危坐聽佳音蘇秀道中大雨梅雨又時雨蘇州仍秀州客行無六月農事有三秋雲氣深鴻鴈烟波沒白鷗衰年慚愧汝物役幾時休晩雨蕭瑟度横塘霏微映繚牆壓低塵不動洒急土生香聲入楸梧碎清分枕簟凉囘頭忽陳迹簷角掛斜陽久雨荒院已無趣愁霖終不開簷聲喧客語屋漏逐人來橋報今朝斷牆聞昨夜摧尚餘湯餅具積潦未為灾久雨有懷曾宏甫欲訪溪山老無如此雨何一春判棄置十日斷經過燈火相看放鶯花卽漸多晴暄如有意數數上南坡苦雨儘道迎梅雨能無一日晴牕昏愁細字簷暗亂疎更未怪蛙爭席眞憂水冒城何由收積潦簫鼔賽西成大暑赤日幾時過清風無處尋經書聊枕籍瓜李漫浮沈蘭若靜復靜茅茨深又深炎蒸乃如許那更惜分陰謝人送壑源絶品云九重所賜也三伏汗如雨終朝沾我裳誰分金掌露來作玉溪凉别甑輭炊飯小爐深炷香麴生何等物不與汝同鄉别甑炊香飯供養于此人禪家語也大熱欲過廣壽寺謁韓子蒼追凉先之以詩執熱今如此追凉定若何長廊受風遠廣殿得陰多盛欲扶笻去還能下榻麽近公如玉雪未厭數經過病中聞鶯啼獨園森古木其下客幽棲盡日緑陰合有時黄鳥啼一聲添晝寂百囀使人迷賴汝生佳聽身今氣慘悽病起贈曾宏甫同病仍同起無聊獨至今酒杯君入手藥裹我關心極暑方無奈新凉又不禁呼兒鋤徑草萬一故人臨蛺蝶不逐春風去仍當夏日長一雙還一隻能白或能黄戀戀不能已翩翩空自狂訃功歸實用終自愧蜂房螢火渾忘生朽質直擬慕光輝解燭書帷靜能添列宿稀當風方自表帶雨忽成微變滅多無理榮枯㑹一歸讀書散帙有佳趣俗人那得知醉鄉非為酒坐隱不關棊几淨幽懷愜牕明老眼宜一生無用處又把教羣兒乞筆市上無佳筆營求亦已勞䕶持空雪竹束縛欠霜毫此物藏三穴須公拔一毛不堪髯主簿取用價能高題雙巖堂老子徜徉地岩幽想像間緑隂城角路青嶂屋頭山簿領惟生睡壺觴不解顔使人留眼處龕壁字囘環泉石堂南坡佳絶處夏木晝成陰青壁可對面寒泉能醒心駕言同勝踐晤語契幽襟野興何曾盡林間棲暮禽第五句一云從游無俗物坐進堂茅宇淨掃地竹爐深炷香一枝藤倚壁六尺簟敷牀門掩人聲寂簾埀晝景長跏趺便終夕端不負茲堂參雲亭晚坐大暑不可避微凉安所尋雲霄非濁世竹樹有清陰海近風先集山高日易沈無因見明月螢火亂更深龍溪新亭不識梯山路今聞駕壑橋蛟龍深窟宅松竹半雲霄與子成二老由來非一朝崖藤如暫寄還往肯辭遙雪中次韻積雪何所待凍雲終未開有時聞瀉竹無路去尋梅只欲關門臥誰能蕩槳來辟寒須底物正乏麴生才負暄炙背茅簷日雖貧辦不難趙衰真可愛范叔一何寒蝨暖無遺索書明得細看羲和有底急薄暮更衣單次韻三首白日無偏照𤣥冥不作難有爐如許大無地可言寒書腹夤緣曬禪心邂逅看呼兒來共此形影未孤單御冬無過酒得酒政應難可愛惟晴日相依度歳寒雖非挾纊坐且作擁爐看飢亦何堪忍斜陽掛食單鑿土篝松火為爐有底難未知行地日可辟中人寒氣味醇醪似光陰尺璧看囘頭長夏景直欲褫中單晁園入春欲攜家一遊晁園淫雨竟不果晁氏芳菲圃因依淥水潯峯巒春著色桃李晝成隂可惜花狼籍仍遭雨滯淫饒陽供客眼只有此園林次朱新仲待制見慶次對之命韻典郡才能薄趨朝氣力微更堪持橐去只合掛冠歸六閤麗千尺四松森百圍公今有班綴衰老借餘輝唐待制班在四松之間次劉千歳喜折仲古見過二首韻新知劉子政生理髮蕭疎勝日歸談笑佳山奉起居摩挲千古物料理一牀書秀色堪餐否聊須摘我蔬門對分流水牕横别岸山茅茨居不翦蓬蓽晝常關傾葢曾三徑搖旌每數間猶欣龍閣老攜得好詩還次曾宏甫見過二首韻客有過蘭若交情似竹林野花無可落村酒不宜斟又得清新句如聞謦欬音南坡盟好在為問幾時尋鶯啼花落後芳草綠隂初良㑹日不足清談風有餘飢餐聊當肉嬾出坐無車勿以貧兼病相過跡也疏次鎭江守曾宏甫見寄韻一别高明去頻為瘴癘侵連滄公境界横碧我山林夜雨思同夢秋風辱寄音他年如衣錦畢世莫分襟次曾宏甫見寄韻今晨尺書至令我寸心寛老去光陰速人生㑹合難竹輿雲洞暖釣艇玉溪寒小憩饒陽否吾衰合掛冠又剖符舒子國蠟屐皖公臺恨不從山簡欣然見老萊宏甫子表勲持詩以來功名身已老交舊首空回早晩依劉去朝廷不乏材又二首一紙寢丘書僧牕屢巻舒無因浮左蠡況復度匡廬政以相望遠非關自作疎夢成飛鳥去千里不躊躇政喜溪南宅宏甫卜築溪南還乘剡縣船予將適越上歸來知底日老去惜餘年觴詠雖休矣音書未寂然省郎君舊物消息已真傳次曽宏甫赴光守留别二首韻聽說光州好淮山是四隣凝香無一事奠枕有餘民世以文章著朝須寵數頻西湖便歸去應不待班春案班春二字不經見攷後漢書崔駰傳駰祖篆王莽時為建新大尹到官稱疾不視事門下掾倪敞諫乃强起班春此詩蓋本之淮白美無度山丹開欲然談誇空海内悵望只溪邊老境嗟無幾宗盟幸有連到時能走送别後見相憐五月六日為叢珍之集于南池呈座中諸公今日攜壺地南池信杖行紅蕖爭入眼白鷺最關情待得跳珠雨來聽打葉聲菰蒲最深處只欠小舟横公廨蓮池浪說吾邦小清池思有餘水風凉枕簟荷氣馥衣裾客位經過少官曹簿領疎良辰不行樂秋水落芙蕖題方氏清芬閣用范文正公韻勝絶登臨地桐江占十分省郎才不世御史氣如雲遂使芝蘭秀俱能錦繡文諸孫又如許百代有清芬效諸生作雪中探梅野梅消息近踏冷訪林端東閣尊空滿南枝雪半殘疎條未禁笑眞態欲欺寒後夜花應好仍勤束火看嶺梅蠻烟無處洗梅蕊不勝清顧我已頭白見渠猶眼明折來知韻勝落去得愁生坐久江南夢園林雪正晴巖桂二首擢本千巖秀開花八月凉雖非傾國色要是惱人香籬下菊清好林間蘭靜芳可憐遭遇晩妙語欠蘇黄栗玉黏枝細青雲翦葉齊團團巖下桂表表木中犀江樹風蕭瑟園花氣慘悽濃薫不如此何以慰幽棲種竹近郊蕃竹樹手種滿庭隅餘子不足數此君何可無風來當一笑雪壓要相扶莫作封侯相生來鄙木奴二兒次韻予亦復次韻二首此君今日醉不復記方隅窈窕因吾有恢台到爾無青猶須雨沐直不要人扶旁舍連高柳何堪與作奴幽居有忙事為竹遶牆隅雨後青葱否風前安穩無井深時汲引架倒復持扶只欠江梅樹君應壻玉奴新種竹有筍此君非俗物今歳有佳兒徑密無人見僧來報客知西家應滿地上番欲横枝添得清聲未君聽風雨時竹軒出筍問訊東軒竹新萌頗不齊文章藏霧豹頭角觸藩羝逸氣先騰上長鞭半落西後來堪底用采掇付山妻似賢齋竹大暑不可度小軒聊復開只消看竹坐不必要風來豈待迷時種何妨臘月栽葉端須雨打有句索渠催所種竹鞭盛行獨遶篔簹徑令人喜欲顛已持蘇老節更著祖生鞭傍舍應除地新梢擬上天真成時夜卵煨茁想明年逮子作亭于官舍明清堂後種竹殆千竿余名其亭以留客取老杜竹深留客處之句因題二小詩云行到竹窮處有亭佳可遊境因吾子勝客為此君留娟淨經時雨蕭梢六月秋豈無他草樹涇渭不同流種竹無他事林間與客遊自應攜手入安用閉門留靜可過僧夏清冝對奕秋衰翁九節杖來往亦風流代書抵筠守譚崧老求茶筍問訊江南美人推道院州雨前收雀舌雪底薦貓頭有客同僧過頻年遣僕求故交今五馬解送老龐不南歸題揚州竹西亭往歳出蕪城飄然一客星又從江北路重到竹西亭楚岸寛圍碧吳山遠借青聖時還舊觀歌吹月中聽登揚州郡圃小金山遙碧亭絶島浸中零案中零二字似應從泠攷一綂志中泠泉在鎮江西北煎泉水記劉伯芻以揚子江南泠水為第一泠或作零亦作􅍽今仍原文飛來棗葉輕碧天圍斗野紅日下蕪城山作脩眉翠人添老眼明園林多勝地獨愛小崢嶸高郵無梅花求之于揚帥鄧直閣送臘臘埀盡迎春春欲回如何萬家縣不見一枝梅有客幽尋去無人遠寄來揚州何遜在政用小詩催鄧帥寄梅并山堂酒甓社湖邊路詩筒得報回舊時雲液酒揚州上尊名也新歳雨肥梅不是園官送眞成驛使來鬢毛都白盡更著此花催謁徑山佛日杲禪師于虎丘此老雲相似何天不往還打包龍井寺持鉢虎丘山一别經年事相逢半日間向來參底語不墮有無間師示余以狗子無佛性語遊虎丘寺重遊吳子國又入虎丘山長日挽人住好風將我還兒童陪勝踐長老記衰顔長老沼公嘗邂逅于三衢無復尹和靖西菴空掩關余二十年前嘗到此山中是時和靖寓居西菴留别榮茂實侍郎老為吳㑹客耆舊不相忘政以牛馬走曾陪鵷鷺行千年書穴在六月鏡湖凉從此登臨地囘頭憶侍郎寓廣教僧寺似病元非病求閒方得閒殘僧六七輩敗屋兩三間野外無供給城中斷往還同參木上座與汝住茶山嶽麓寺嶽麓知名寺幽尋到眼邊林深不見日山靜只聞泉便欲呼舟去聊為借榻眠明朝遊歴處都在小牕前嶺外出巡嶺外身逾老江南首重囘有猿啼夢破無鴈寄書來山雨晴猶濕蠻烟晝不開如何緣許事奪我手中桮南雄郡守致怪石四株只道無南鴈書今數往還一牕江表地數朶廣東山奇甚君風骨蒼然我面顔歸時要船重更為斸岩間何德器寄道州怪石一去春陵郡天星幾度回身今鏡湖住山自道州來指㸃雙巖出摩挲一笑開是誰營致此石友似陳雷太湖石誰憐孤峭質移在太湖心出得風波外任他池館深不同花逞豔多愧竹埀陰一片至堅操那憂歳月侵怪石濟勝初無具搜奇只此間飛來太湖石坐我洞庭山面面成牕户峯峯出髻鬟寓居端欠此頗欲載之還聞寇至初去柳州剝啄誰敲戸倉皇客抱衾只看人似蟻共道賊如林兩岸論千里扁舟抵萬金病夫桑下戀萬一有佳音聞寇退欲還柳州寄柳守常子正舊隱龍城在書傳喜可知還來避地客已去弄兵兒瘴色休看鏡行期不問龜中秋一杯酒定與故人持大藤峽一洗干戈眼舟穿亂石間不因深避地何得飽看山江潰重圍急天横一線慳人言三峽險此路足追攀歸途歸途似烏鵲得樹且依棲一寸客亭燭數聲村舍雞路長風正北野曠日沈西夢作祠官去江干入馬蹄自廣西歸上饒閱所藏書久矣山人去懷哉屋壁藏侵陵閱梅雨調護乏芸香次第繙經集呼兒理在亡乞歸全為此何愛橐中裝初還信州呈寓居諸公萬事不稱意一生長損心稍知閒有味又覺老相侵田舍那能問溪山未暇尋清歌一杯酒聊與故人斟吕郎治先以職事至常山縣不敢越境以書致兩郡酒日鑄茶子到常山縣饒陽有敝廬相望百里地空得數行書睡思茶料理愁懷酒破除新秋卽在眼過我定何如治先許秋間攜家見過廸姪屢餉新茶二首吾家今小阮有使附書頻喚起南柯夢持來北苑春顧余多下駟況復似陳人不是能分少其誰遣食新勑廚羞煮餅掃地供爐芬湯鼎聊從事茶甌遂策勲興來吾不淺送似汝良勤欲作柯山㸃俗所謂衢㸃也當令阿造分造姪妙于擊拂造姪寄建茶汝已去閩嶺茶酒猶粲然買應從聚處姪居三衢俗言所出不如所聚寄不下常年洗滌盧仝椀提攜陸羽泉予所居茶山泉名無人分得好更憶仲容賢述姪餉日鑄茶寳胯自不乏山芽安可無子能來日鑄吾得具風爐夏木囀黄鳥僧牕行白駒談多轉生睡此味正時須曾同季餉建溪顧渚新茶雨潤梅黄後風薫麥秀初不持新茗椀空枉故人書顧渚瓊糜似閩溪玉食餘吾宗重盟好併以遺閒居尹少稷寄顧渚茶駸駸要路津舊日水南人尙記茶山老能分顧渚春江淮勞廟算河路暗胡塵憂國惟生睡降魔固有神嘗建茗二首破除湯餅睡倚賴建溪春往日惟求舊今朝遽食新不辭濃似粥少待細于塵寳胯無多子留須我輩人茅宇已初夏茶甌方早春真成湯沃雪無復渴生塵有客嘲三韭其誰送八珍不如藏去好孤負一年新煎茶貧中有佳設石鼎事煎烹顧渚草芽白惠山泉水清酌多風可御薫歇霧猶横飲罷妻孥笑枯腸百轉鳴鄭侍郎招賞瑞香感舊有作鄭驛留賔處看花又一年香囊依葉密錦繖向人圓子敬新游岱吾宗復在邊小詩相促迫感舊一棲然去歳與王元渤曽宏甫同作詩故有此句榴花樹陰看已合榴朶見初明當夏豈無意避春真有情花雖後文杏實可待瓌橙病叟緣何喜留苔看落英九日小圃菊花有開者病瘍不能泛一桮把玩而已黄菊開何許疎籬小隱家似知重九日故放兩三花病著桮無淥衰年髮半華佳辰辜負汝滿把但成嗟宫祠滿秩雲水天台郡祠庭我所監幾年真傲吏今日是前銜禄米誰周急園蔬不療饞上書端未免定不達空函送曾宏甫守天台此地多朋好惟君似弟兄不堪輕作别那得易為情秋日行灕水春風上赤城莫言無過鴈略不寄佳聲送戚弼甫解官鹽場二首聽說君中外堂堂世上名文華張右史君之外祖也正素老先生已上三年課相期萬里程贈行無好句聊用一杯傾訪舊今無幾惟君昔有連笑談傾一坐筆札富諸賢君蓄前賢墨蹟甚富作惡又數日從游經二年勉旃繩祖武窮達自關天送李商叟好去皇華使佳哉所領州職除天祿閣家近岳陽樓一別誰青眼相逢各白頭西來多驛騎能寄短書不送紹興張耆年教授之永嘉學官海内孤寒士江頭獨冷官胡為渉脩阻不肯近長安蠲紙無留筆生枝不帶酸名山天下少行矣雪消殘送洪州西山香城長老通公惠通聞說香城寺孤峯靉靆間公今懷祖印老去入鄉關通洪人也穩泛春波水深藏暮雨山筆頭多語句寄我不當慳逮子赴湖南漕司舉寄之舉子忙如此槐花細細開吾兒承詔去有客附書來鶴髮風前帽雞頭月下杯衰年餘幾許勝日不同陪逮子以今歳正月十六日之毗陵而以十二月十五日還舍銓試第二且得新雛以詩示之不見吾兒久今朝慰眼前分襟燈火夜囘櫂雪霜天中鵠令人喜將雛得我憐一杯歡笑後急急理塵編挽李泰發參政三首公昔遭前政忠精不少衰立談廷爭地上疏里居時意氣南山在名聲北斗埀心知不亡者送往得無悲漢室推元禮唐家得衞公龍門傾後輩鯨海伏孤忠守護多神物旋歸一老翁如何九江路萬事併成空道義曾無間因依遂有連旋聞新雨露亟返舊林泉父老門庭下兒孫几杖前不令成此段泣涕問蒼天挽石參議人物千巖秀家風萬石餘劉侯深愛畫杜氏富藏書卿寺曾親擢藩方有詔除遽隨丹旐去老淚濺衣裾挽焦適道寺丞二首氣質推渾厚言談見切磋過從方里巷挽送忽山阿吉士今如此高穹定若何交游雖不乏耆舊已無多豈意初秋事俄聞遠日期在公無可憾有客不勝悲宅兆溪山好郊原草木衰給孤園上路無復往還時挽陳丞相身已棲巖壑公初冠廟堂奉祠方徳庇次對復恩光政爾為舟楫如何壞棟梁紼謳爭㸃筆衰謝獨難忘挽梁元功諌議豈弟更三郡題評冠一鄉繩愆御史疏補闕諌臣章直歎牙絃絶明嗟魏鑑亡皇情應震悼追賁盛龍光挽程伯禹尚書三首誠明猶博學直諒更多聞休父中興傑宣王上聖君精忠自金石感㑹合風雲不謂生芻奠今來下馬墳璧水三千士文闈第一人煌煌持紫槖亹亹逼鴻鈞得郡還辭劇居家更乞身期頤如可料愁絶上元春昔在宣和日雍容接俊游横經臨璧沼提槧上瀛洲去徳俄千里依仁復兩州豈知埀老别華屋落山丘挽王元渤舎人二首早得文章譽仍高政事科珠璣隨咳唾襦袴起謳歌老去貧逾甚歸來病更多善人今已矣施報果如何觴詠陪真率言談見坦夷凄凉今日事牢落暮年悲有淚看詩巻無情對酒巵哀哉王子敬吾黨一何衰挽鄧禹功山海淮壖利吾徒職駿奔長官惟我在同事只公存句法深深見心宗細細論清風今已矣微月耿黄昏挽向伯恭侍郎三首忠義雲霄逼聲名日月懸劇談風滿坐傑作氣無前詩酒今彭澤山林昔輞川不隨秋露盡家集燦成編用舍行藏事如公世所難誰能奉香火直作掛衣冠國論言猶在宸毫墨未乾一生無限好留與後人看昔在兒童歳曾陪竹馬游薌林叨共席泛宅幸同舟忽忽三年别堂堂萬事休孤風亭下夢猶記曩時不挽晁恭道侍郎二首家令西京傑文元聖世賢大參名更重學士集爭傳此道長囘首惟公早比肩嗚呼百年半齎志遂沈泉往日趨金馬中年剖玉麟論思貳卿事歌詠別都民久矣窮諸妄歸歟契一真東園尊俎地俯仰跡成陳挽呂惇智用中直閣二首呂卿豪傑士家世兩申公小試為郎日深知有祖風名高中興後病著半生中遂作青山去嗚呼萬事空歴數交游内公家雅有連舍人先卽世駕部復沈泉遠訃聞今夏高談記昔年離窮一片影大似老夫然惇智昆仲惟偉信在耳五言排律戲同諸孫課春日遲遲晝漏今多少人閒只自知簾埀春色靜窓度日華遲柳影徐徐轉花隂緩緩移助成耕野事添得讀書時醉著三竿睡憂來一局棊吾徒須愛惜看卽是冬曦王履道左丞見訪近市三椽屋斜陽一席門故人空厚祿過我獨高軒轉刻求巾屨忘形奉笑言性容安石緩道許穆生存暝色遙岑合歸途漲水渾傳呼聽已遠依舊雀聲喧雪中登王正中書閣對雪同誰語登樓似欲仙人家修月户丈室散花天山擁鉤簾外江横隱几前寒深落鴈渚清集釣魚船扶病從摩詰銷憂得仲宣展書明細字烹茗濕疎烟月好還同夢詩成已下弦是日旣望後十日而詩始成明年儻相憶一為到關邊予有嶺南之行秋雨排悶十韻今夏久無雨從秋卻少晴空濛迷遠望蕭瑟送寒聲衣潤香偏著書蒸蠧欲生壞簷聞瓦墮漲水見堤平溝溢池魚出天低塞鴈征螢飛明暗廡蛙閙雜疎更藥醭時須焙舟閒任自横未憂荒楚菊直恐敗吳秔夜永燈相守愁深酒細傾浮雲㑹消散鼓笛賽西成食蜂兒有感蜂兒雖小物各自有君臣奪食已非義焚巢兹不仁殺身緣底罪作俑定何人不憚高論直寧辭遠送珍解包顔有喜入坐齒生津海錯休前列山肴且不陳其誰心惻怛為汝鼻酸辛願下孩蟲令恩傾雨露春茶山集巻四
