body:
  text: 茶山集卷五宋曾幾撰七言律詩辭召命呈子忱侍郎懶慢無端世所遺獨憐衰病少光輝惠然投我有華衮何以報公無紵衣末學虛聲慚取譽舊章多識恐成非侍郎清鑒懸明鏡莫道塵埃一㸃飛王周士顯謨自閩中歸溈山舊隱道經臨川惠然先辱且出示吕居仁送行詩有見及語因次其韻贈周士此生寡偶固其宜何况身從老得衰門外設羅誰一顧道旁傾蓋子相知斷金已定交逰事伐木仍傳故舊詩聞說溈山堪避世卜鄰他日更無疑雪中陸務觀數來問訊用其韻奉贈江湖迥不見飛禽陸子殷勤有使臨問我家居誰暖眼為言憂國只寒心官軍渡口戰復戰賊壘淮壖深又深坐看天威掃除了一壺相賀小叢林務觀所結菴號小叢林云陸務觀效孔方四舅氏體倒用二舅氏題雲門草堂韻某亦依韻陸子家風有自來胸中所患郤多才學如大令倉盛筆寺本王子敬宅有筆倉文似若耶溪轉雷襟抱極知非世俗簿書那解作氛埃集賢舊體君拈出詩卷從今盥水開以湯餅招韓伯周王巖起二提舉鄭深道曾宏甫二使君宏甫有詩次其韻鏡湖淮瀆舊刺史廬阜赤城新使君敢持湯餅一取飽更用尊酒重論文玉川遣奴致雙鯉吏部呼兒書八分不如哦君七字句舉首看度南山雲曾宏甫見招看海裳而郡城新有更初闔扉之令豫聞鼓亟歸一詩呈宏甫西蜀名花得許穠晚來呼客醉花中可憐朵朵枝枝弱自占深深淺淺紅收拾雖微少陵老寵光還有翰林公無聊獨出城闉去燒燭看時恨不同次曾宏甫社日賞海棠吳守宅且試新茗韻一樹深深地主家外邊誰復見穠華却因社日治聾酒得醉春時近眼花著粉施朱俱愜當吹風洗雨但驚嗟酴釄芍藥埀埀發更試頭綱一餅茶蘇秀道中自七月二十五日夜大雨三日秋苖以蘇喜而有作一夕驕陽轉作霖夢回凉冷潤衣襟不愁屋漏牀牀濕且喜溪流岸岸深千里稻花應秀色五更桐葉最佳音無田似我猶欣舞何况田間望嵗心喻子才提舉招昌源觀梅倦不克往蘇仁仲有詩次韻問公何許看花回賸說郊坰十里梅樹雜古今他處少枝分南北一齊開昌源已辦行厨去離渚猶須使節來況復蘭亭公所葺清流九曲要傳杯聞降湖北提鹽一為散吏寄郊坰三見南山木葉零病著不能朝帝所老來只合奉祠庭繡衣玉節官仍作音佐流水桃花路再經洞口故人應問我淹留何處髮星星南山除夜薰風吹船落江潭日月除盡猶湖南百年忽已度强半十事不能成二三青編中語要細讀蒲團上禪須飽參兒時顔狀聽渠改瀟湘水色深挼藍喜聞天兵已臨衢寇野宿溪行各晏然吳頭楚尾接風烟豈知苻澤深為祟不道柯山最近天境上音郵多浪語殿前兵馬是真傳未能日報書三捷竹簟紗厨到曉眠至日述事時江海大捷觀臺四望楚氛開雲物輪囷瑞九垓大雪山隂消得盡微陽井底放令回江心皂幟千艘沒海角黃旗一騎來想像天顔知有喜正衙入賀薦金罍寄泉南守趙表之天遣髙人下别峯表之雙塔所居一軒號別峯諒無官事汩胸中香來海外沈煙碧果熟林間荔子紅曹植詩篇疏入社裴休參問逺同風蕭然丈室維摩詰何日文殊對此翁寄浙漕韓公圭璡故人官達更相求不但寒溫札翰投深貯爐薰來嶺海逺包書帙到林丘未知挽粟飛芻外尚及哦詩把酒不千里往還殊不隔夢魂常繞日邊州寄浙東參議鄭禹功憶昨分攜自日邊星辰忽忽幾回天故人老作諸侯客今我初無二頃田安得詩書同保社敢煩札翰訪林泉萬山不隔襟期處賴有渠儂一味禪禹功參禪有省寄十扇與陳述之饒陽輕箑人共知封書寄與今其時清風兩腋想披拂眀月千里能追隨一朝貴重得謝傅中道捐棄憐班姬吾徒且當置是事魯縞如雪題新詩寄信守徐稚山侍郎歸去來兮莫問津有船即買繫江濱自應一學陶元亮不用更呼祁孔賓已卜春前春後日重尋水北水南人使君為我新茅棟數有書來意甚真寄何晉之直閣别來不寄一行書貝葉琅函想自娛喜得直廬新內閣夢成同舍舊東都絶知筆底鶱騰在未省體中安穩無見說閩山小兒子夤緣即罷數趨隅寄提舶王季羔外臺隱吏極風流記得衰翁舊日不三島十洲曾接武千巖萬壑更從遊官曹閒似雲間鶴賈舶紛如海上鷗幸有西湖應著我時操艇子過明州撫州呈韓子蒼待制一時翰墨頗橫流誰以斯文坐鎮浮後學不虛稱吏部此生曾是識荆州相逢未改舊青眼自笑無成今白頭聞道少林新得髓離言語次許參不子蒼㩦賀章見過用韻為謝胡嶺三年自竄流歸來差慰此生浮政緣天下無雙士非為江東第一州懸榻坐中難入眼設羅門外少回頭袖詩不意高軒過問里人曾到此不次子蒼追憶館中納凉韻飯罷蓬瀛屧響廊薰風啜茗倚繩牀草荒老氏藏書屋山繞王家避世牆湯餅承公薦槐緑爐芬遣我夢藝香欲論舊事愁無奈願挽天河作酒漿聞李泰發參政得旨自便將歸以詩迓之苦遭前政墮危機二十餘年詠式微天上謫仙皆欲殺海濱大老竟來歸故園松菊猶存否舊日人民果是非最小郎君今弱冠别時聞道不勝衣案瀛奎律髓注秦檜謫趙丞相鼎李參政光胡編修銓于海外必欲殺之趙先歿李胡皆生還又最小郎君原注謂孫壻文授今附識於此李子長縣丞示詩卷乃祖天邊太白星裔孫名字見家聲官曹卑似崔斯立句律清如庾義城贈我不知相報答投人政恐未分明丞哉于子元無負松竹成隂水亂鳴汪彥章內翰除守臨川以詩賀之臨川內史詔除誰里巷傳聞報客知金馬門深曾草制水精宫冷近題詩行看畫省旌旗入定把書麟筆札隨若訪毗耶舊居士無人問疾鬢成絲賀曾裘甫得解南風盛事昔無聞乃祖詞場筆有神一榜豪英收幾士同年伯仲看三人今君科第欲驚世他日文章當致身意愜歸來能訪我亦令宗派倚生春吳元中少宰復官守長沙以詩賀之眼看亂後幾凋年神護靈光獨巋然靖康宰相六人惟公在矣鏡裏未添新白髮囊中初得舊青氊寄書地正當回鴈晤語身方走跕鳶社稷于公端可卜一篇江漢詠周宣題徐子禮自覺齊時子禮為江隂抱麾之行徐子長吟復短吟竒書窗下日幽尋誰知密密深深地參得明明了了心千里澄江空更濶中秋素月古猶今使君胸次端如許願以餘光照所臨題巾山廣軒次韓無咎韻鈴齊逼仄未銷憂暇日聊為帢幘遊喬木中間藏古寺籃輿直上得名流豈無雲水連孤嶼亦有山林望一州後日玉霄峯頂去憶經行處為回頭張子公招飯靈感院竹輿響肩艫啞嘔芙蕖城曉六月秋露華猶泫草光合晨氣欲動荷香浮給孤獨園賴君到伊蒲塞供為我羞僧窗各自占山色處處薰爐茶一甌吕居仁力疾作詩送行次其韻雪屋風窗逼嵗窮一杯情話與誰同向人寡偶無如我抵老相知獨有公文字欲求千古事簿書還費二年功新詩已佩臨分語况復哦詩是病中次韓叔夏送行韻乃祖曽為文送窮兒孫氣味略相同立朝有疏慕汲直去國無書干子公竹椅蒲團深著意雪窗螢案坐收功自憐無補朝廷事又向蠻煙瘴雨中次蘇守朱新仲舍人留㑹稽之行韻公知此老發船時不作河梁送别詩但說江湖留我住為言巖壑與人期凝香燕寢定自好懷綬稽山無不宜早晚歡迎剡溪上去公亦復意遲遲適越留别朱新仲扁舟緑漲漕渠時解釋離懷政用詩管鮑交朋無變態朱陳嫁娶有佳期長洲茂苑著身久秦望鏡湖行腳宜二浙中間才一水短書莫使寄來遲寓居有招客者戲成蓬蒿小院立秋天禿鬢凄風雨颯然丈室何人問摩詰後堂無地著彭宣牀頭白酒新浮甕案上黃詩屢絶編不厭寒家淡生活書窗期與子周旋次勸農韻典郡治中總得賢郊原一出萬人傳山行野渡時時雨婦餉夫耕處處田說與老農無罪歲但當力作有逢年驅兒播種貧家事可奈西疇只仰天處守謝景思寄勸農詩次其韻使君小隊出田間郤擁旌旗鼓吹還走送勞農詩俊逸懸知領客事清閒坐曹已白兒時鬢置酒聊朱病後顔無路從公上烟雨夢魂長繞處州山乙卯嵗江南大旱七月六日臨川得雨奉呈程伯禹待制縹眇爐煙上帝閽朝來一洗旱如焚壟頭無復成龜兆水面初看起縠紋政使夏畦炊白玉未妨秋稼割黃雲使君閔雨心猶在化得邦人不茹葷時屢禁屠宰空公長老一出即住雪峯書來以建茗為寄長句奉呈空公時以筆硯作佛事也此公出世使人驚道眼看來郤未曾政爾雪峯千百衆淡然雲水一孤僧不妨詩筆作佛事已用茗甌傳祖燈我老尚堪行腳在因風為寄古崖藤送曾宏甫赴光山守千里光山去拊循長淮練靜屬城闉開門自少公家事領客寧無我輩人網戶得魚肌切玉兵厨有酒色鎔銀老翁生死誰相訪札翰時時到水濱曾宏甫到光山遣送鵝梨淮魚等數種吾宗席未暖淮濱遣騎持書賸送珍美實來從壓沙寺巨魚長比藉糟人欲雕好語略為報但愧新詩如有神領客不無桃李樹知君憶著故園春次祕丞李希聲錞新省韻吾皇德澤小滄溟倒載干戈不用刑天以圖書效河洛人如蘭玉秀階庭石渠盡日蓬山影金殿凌虛帝座星從此崇文三萬卷權輿甲部聖師經次何德器見贈韻德器交情素所敦乃翁雖逝典型存不惟歆向皆書府况復封胡是相門意氣君方凌碧落年齡我已到黃昏今晨鏡裏如膏沐歡喜仁人有贈言和李宗丞海邦西渡即朝廷雙闕瓊臺天下名跋馬望君真屢矣拏舟過我太遲生門䦨不日登元禮句律今朝得少卿已辦黃花一尊酒有如江水莫寒盟次馮子容主簿信州築居韻聞君卜居水雲鄉欲往從之各異方屋角樹隂傾老蓋溪南山色過浮梁薰風自在翻書葉梅雨相欺敗堵牆長鋏高歌歸去好幽棲為我覓陽岡老杜卜居詩要求陽岡暖一作與君勝日杖崇岡鄭深道餞曾宏甫台州之行見招風雨不能度溪橋作此贈宏甫一觴相屬費招呼况復吾宗攬轡初春雨春風俱作惡溪南溪北頓成疏刻殘紅蠟君哦句挑盡青燈我讀書細故乖違猶似此功名不必問何如送曾宏甫守天台莫作陽關墮淚聲丹丘勝事要君聽興公賦裏雲霞赤子美詩中島嶼青天近豈無宣室召地偏猶有草堂靈鑾坡飛上勤回首記取來游舊客星送李似舉尚書帥桂州二首桂林佳事我能言四座停杯且勿喧人物豪華真樂國江山清絶勝中原親嘗荔子薰風浦靜對梅花小雪村邊鎖無虞庭少訟不妨仙釋問真源整整三朝玉筍班幾年流落奉祠官不令歸曳尚書履亦合先登大將壇從昔南荒除帥重只今西顧倚公寬長途不惜身為御欲上龍門自作難送周德修侍郎守武陵郡傾蓋江頭許定交談經論事聽忘勞轍環萬里猶持橐門掩三秋却夢刀流水落花公境界摘山煮海我官曹人生五馬從來貴行樂何須歎二毛送王亞之執手河梁有贈言檣烏端為小留連無風浪起勤看客不盡江來穩放船煙雨樓臺空夢到雲天鴻鴈只書傳不須更問西歸日定是彤庭射䇿年送蘇伯益提幹代還侍下伯充之孫伯業之子幕下官曹寄玉溪溪邊野老借光輝齧氈校尉衝寒去扇枕郎君觸熱歸大父正攜靈壽杖尊公更著老萊衣贈行未說功名事此事如公世上稀送王宣子赴廬陵守秋風送逺廬陵守車騎光華鬢未斑早嵗名高天下士同時身到海中山淹回二水分流處邂逅千巖競秀間行矣衰翁如未死錦衣白晝候君還送賀子忱參議之官閩中越侯賓客有輝光領袖今年得望郎詩似拾遺留劍外才如處士去河陽到時晚荔論園買舊日春茶洗盞嘗璧水同寮幾人在賸將書疏及滄浪送路應求赴郢守一雨全清去路塵石城風物話臨分了無獄訟勞官長賸有江山奉使君樓上今誰能和曲鼻端那復可揮斤吾人莫道知音少千里歡謡入聽聞送尹叔東珣之象州歲星一别又回天貧賤交情老更堅傳世典型清徹骨向人懷抱直如絃經營象郡三椽屋漂泛龍城一葉船風雨蕭蕭雞自曉此心常與子周旋送吕倉部治先守齊安案瀛奎律髓注吕倉部大器字治先茶山之壻是生東萊先生今附識于此齊安剖竹要循良分付吾家坦腹郎賸有江山連赤壁略無訟獄到黃堂鈴齊晝永宜深念邊鎖秋高合過防此地元之餘烈在勉旃幸未鬢毛蒼送周仲固寺正提舉湖北茶鹽余建炎己酉歲嘗為此官洞庭湖北飽知聞嘗以輶軒犯楚氛逺有光華新令尹分投閒散故將軍武陵源口自碧水古德山頭多白雲一路澄清縱幽討不妨書札細論文送方務德將漕廣西時余亦有此除壯時一别鬢成絲忽漫同盤又語離底事不為三日款相逢猶是半年遲溪邊贈䇿正楊栁境上開尊應荔枝莫歎嶠南荒絶好光華最有逺人知送朝恭侍郎守臨川才猷表表自名卿何况傳家烜赫聲道院老人真乃祖雪堂高弟是諸兄一牛鳴地正接跡五馬行時尤見情擬峴登臨試回首小軒應記碧山橫送紹興帥湯相得請洞霄歸括蒼二首武公入相不虛傳奏牘求閒郤更前聖主閔勞天下士詔書許作地行仙少微星分臨江左大滌山門鎖日邊便以公歸良易耳午橋雖好莫留連誰言富貴踐危機永日深春故里歸烟雨高樓增意氣蓬萊傑閣少光輝向來赤舄又遵陸此去青鞋長掩扉畫㦸門東是茅宇鈴齊想像獨依依送逮子赴秋試江西漕司有詔詞場獵俊英西風匹馬豫章城欲追諸父鴈行上肯逐羣兒魚隊行金是莫邪當自必璞非死鼠㑹相明筆端妙處還知否萬里秋天壯氣橫示逢子清臞骨相類諸生黽勉寒窗守一經用賦要窺司馬室學詩頻過伯魚庭可憐親髮鏡中白莫負子襟身上青五桂䕃門家世事寂寥天畔幾回星同逢子韻寄逮子促其歸九日清尊要及辰誰令形迹滯甌閩饒陽城畔趨庭子長樂坡前入幕賓竝倚門閭吾二老相求原隰汝三人借令不共黃花酒莫與西風作後塵逮子得龍團勝雪茶兩胯以歸豫其直萬錢云移人尤物衆談誇持以趨庭意可嘉鮭菜自無三九種龍團空取十千茶烹嘗便恐成災怪把玩那能定等差賴有前賢小團例一囊深貯只傳家用逮子韻奉贈鄭禹功參議雨餘依砌上蒼苔竟日山房閉不開下馬厭聞生客至敲門喜見故人來長哦緑竹詩三疊小酌黃花酒一杯竹菊皆小圃有之此外相看復何事團蒲隱几湛靈臺次錢處和贈赴召之行韻蒼顔白髮海邊州敢與君王側席求水似篙深催我去雨如絲下要人留偶然結綬登畿左不用攀轅擁道周高卧耦耕吾有分何心賜璧取封侯留别三姪僧窗又與汝周旋百感相隨到酒邊無復吹箎如異日空驚枕塊已三年一門叔父吾衰矣東閣郎君但勉旃不為懷金紆紫事澡身玉雪是空傳春來聞故舊多云亡者作詩示同志鴈足曽無一字收有時書到郤生愁故人疊疊半黃壤今我蕭蕭全白頭大抵百年皆逝水可憐萬事只浮漚朝聞夕死真吾道聖處工夫辦得不次鄭禹功韻怪底消除執熱煩鄭公方丈接三韓空餘坐榻懸犀柄豈有行厨洗玉盤作吏忽驚𤣥鳥變尋盟未向白鷗寒諸山只在登臨眼安得陪君杖履看次招客見贈韻夏夜僧窗淡月籠新凉絶類九秋中麴生入座有清濁荔子堆盤能白紅持此淹留數佳客慰豫牢落一衰翁驪駒散後君知否獨臥山房竹裏風次徐惇立韻此身那得作飛仙魂夢相從但欲眠極目參辰不相見論心膠膝未為堅别君甲子三千日問我春秋七十年久要不忘吾輩事交情自昔幾人全次王元渤問余脫齒韻齒危但以粥充虛辜負公家夏屋渠舊說夏屋大具渠勤也言設大具其意勤勤然政恐麴生深作祟可憐髯簿頓成疏炙轂子謂羊為髯須主簿動搖不減韓吏部蹴踏非同焦校書落勢今年殘未已秖應從此併無餘吳帥見和亦復次韻案此詩前似有倡和一首為録者佚去九日心飛類琯灰龍山直上好樓臺老身稚子扶將去勝地元戎借得來酒似朝霞披霧散詩如秋菊艷霜開至今研席珠璣滿莫道登高寂寞回次憂字韻案此詩前似别有次某人某字韻一首亦録者佚去公家伯仲世名流畫省歸來共樂憂稍喜對牀聽夜雨永懷扇枕作凉秋誰言小草能蠲忿未信閒花可療愁惟有塤箎發清吹渠儂無厭亦無求挽韓子蒼待制佩聲曾到鳯凰池不盡胸中五色絲三黜本因元祐學一飛合在中興時忽驚地下修文去太息門邊問字誰猶想泉臺有新作郊原小雨欲催詩挽鄭禹功鄭公高義絶陳雷别我姑胥首重回書跡橫斜良足喜訃音曲折可勝哀定知泡影埀埀盡故傍江湖得得來俗眼看公終未是無生滅處詠歸哉挽梁元功朋儔大半白頭新臭味同流少似君交契雖深淡如水宦情何翅薄于雲安知暮景鶯聲谷遽作高原馬鬛墳忍向西風歌薤露略無好語頌清芬挽陳丞相中興論相得耆英進退能為國重輕有望臨人山泰華無私待物器權衡兩朝禮貌緣同德多士憑依為至誠自古元臣薨位少一時生死極哀榮悼雲泉勤庵主正坐長齊早得衰師持齊未嘗少破中年一病莫醫治懸知水復山重地難度風叨雪虐時乘興前村曾有約師有前村尋梅之約寄聲絶頂可無詩師病甚猶寄聲索余翠微亭詩禪房手自栽花木付主林神好護持庵中花木皆師手植茶山集卷五
