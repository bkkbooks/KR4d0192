body:
  text: 茶山集巻二宋曾幾撰五言古詩自越上還信步尋梅客子千里至未曽款入門妻孥勞苦外徑走江梅村江梅若有待欲謝花猶存向人一笑粲冷蘂生春温遶樹三匝已投空雪飛翻歸來理夢事淡月籠黄昏鄭侍郎招賞瑞香浮花雖不多要是乏美質前庭錦烘籠君向何許得色香極穠麗裁翦極細密複幕重簾開毋令犯風日晁侍郎折贈芍藥三種室空無侍者終日延白光今夕果何夕粲者忽在旁得非散花天來試鐵石腸非羅復非綺何物爲衣裳或濃若猩血或淺若鵝黄或如淡臙脂薫以百和香竟不可意解發書問何祥乃知延閣老買得從維揚自不耐渠惱幽懐可禁當牢辭又不敢熟視徒彷徨吾聞諸古人物美應獻王呼兒燎沈水持以供虚皇明秀堂松堂在柳州路内柳侯所為邦十步一遺跡蒼官列前墀相對儼如客邦人言此松曾及侍侯側風號四百年雪立二千尺江城閒草木詩巻多採摘柑非往日黄柳是近時碧子厚手種柑柳皆有詩同生不同死乃見老氣格尚想哦其間清聲出金石龍鱗未脱落熊軾幾換易臨民有餘師視此古遺直種芭蕉僧牕誰與晤有竹兩三竿栽培費老手方法傳多端朝朝問無恙暮暮愁其乾調䕶閲三載今年遽彫殘芭蕉雖小草長大不作難一身菡萏然萬竅玲瓏間滿中貯春水烈日何能干以兹隂凉葉代彼青琅玕但恐質柔脆不堪歲祁寒人生無牢強當作如是觀詠蠟梅花時冶遊郎紛若一鬨市蠟梅空自芳俗眼不稱意洗心無一塵坐覺香細細乃知成風斤要斲郢人鼻吳甥遺靈壁石以詩還之閒居百封書總為一片石牕中列遠岫所欠者靈壁吳甥手持來知向何許得鏗鏘發金聲温潤見玉色諸峯掃空翠一水界山白嵁巖出其間如月挂虚碧坐令所珍藏不作一錢直吾雖甚愛之子亦有此癖歸與霅溪旁從汝舊知識欲去復遲遲摩挲遂移刻何德器贈太湖石愛山已成癡愛石又成癖徒聞有絲溪時復夢靈壁太湖只在眼曽未收寸碧多自五嶺來仍煩百書索何侯小崢嶸湖水深處得蒼潤波濤餘巉巖鬼神力摩挲復湔洗攘取畏賓客偶然及幽事遣送初不惜俄頃交定盟歡焉慰岑寂奪君書几間坐我洞庭側持還豈人情藏去有慙色苦乏仇池篇如何滿髙直寄崑山李宰覓石崑山定飛來美玉山所有山祇用功深刓畫歲時久崢嶸出峯巒空洞開户牖幾書通置郵一片未入手即今製錦人在昔伐木友嘗䝉委繡段尚闕報瓊玖奈何不厚顔尤物更乞取但懐相知心豈憚一開口指揮為幽尋包裹付下走散帙列岫牕摩挲慰衰朽造姪寄人面毛竹杖四麥秋氣清和槐夏日隂翳塊然守蓬蒿何以破昏滯肩輿卒輩乏徒步腳力費出門即林丘散䇿空夢寐賸為猶子憐遽以此君至分明人面目刻畫老根柢毛君又一竒枝幹不少異想應開一束妙簡得三四今晨入吾手夷險可歴試芒鞋與周旋白拂相嫵媚人生七十稀況復已過二多謝汝扶持無乃太晚計方時敏作寄茶詩允迪趙承之爭論鋒起有以詩碁取決之意二者僕皆不能姑次韻叢林一轉語矛盾生諸方不知維摩詰衆論付括囊君家富月團入眼驚未嘗勸君勿浪出中有雙龍藏一朝不自秘詞鋒起堂皇詩碁競攻取信美非吾鄉吾鄉亦何有黍麥紛低昂作詩天所戒但欲身稍昌奕碁正如詩坐看星埀芒怪君眞不亷顧我俱無長天寒袖手埀未厭舌本強懸知決戰時兩陣爭堂堂詩壇與碁兵傷殺亦大當歸去竟何得驚雷轉空腸即事朝隨粥魚作夕與棲鳥眠中間復何事野飯炊山田摩腹步脩廡披襟坐南軒薫爐鬱佳氣茶鼎浮輕烟閒開竹牕帙靜憩蒲團禪庶幾永白日亦用銷殘年東軒小室即事五首巻書坐東軒有竹甚魁偉清風過其間戛戛鳴不已寫之以素琴音節淡如水不惜為人彈臨流須洗耳鼠跡印塵几蝸涎篆書帷兒童勿除去佳處正在茲人言有何好此段眞成癡俗子徒敗意幽懐定誰知去聖未云遠故在黄巻中孰能領其要直用一理通森羅廢興事瑩若磨青銅使我見萬古敬謝典午公烹茗破睡境炷香玩詩編問詩誰所作其人久沈泉工部百世祖涪翁一燈傳閒無用心處參此如參禪有客過丈室呼兒具爐薫清談似微馥妙處渠應聞沈水已成燼博山尚停雲斯須客辭去趺坐對餘芬盛夏東軒偶成五首一堂既虚閒一室可息偃松篁度風清牕戸去日遠幽禪過亭午凉氣生薄晚閫内即妻孥更深遂忘返攜簟入深竹脱巾挂低枝無令兒輩覺更恐俗客知清風何故來口詠淵明詩凉冷似太過還從徑中歸松風夏逾清竹日午更淨蕭然松竹間得此林壑性異哉今日暑無復有晨暝疲薾安所逃茅齋入僧定因病不舉酒況當朱明天客至但茗椀談詩復談禪甘寒百尺井舊日陸子泉安得僧舍雪霏微濕茶烟澗蒲上九節不受塵土姿清泉自澡潔白石相因依種蕉水中央佳處略似之誰能後彫賞惟有歲寒知友直軒友義喪來久琢磨復誰能金鉤被采錄絶棄朱絲繩直哉少稷甫一室清于冰危坐對書帙曲几非所凭日暮無人來疎籬上寒藤惟有手種竹挺然得其朋風低與雪重搶地如弗勝政使可斷折天姿諒難凌物或亂眞贗君其别淄澠攘羊而證父是子烏足稱所以貴温潤不令見觚稜要我細商略此言有師承松風亭四首幾得喬松十餘四合而中空其下可坐故名之云長卿壁四立杜老茅三重茶山窮次骨憩寂以長松直幹以棟宇清隂自帡幪山泉落髙處審聽是松風客至引幽步步及松風亭問亭何當作笑視何足聽俗論鬨蛙黽市聲殷雷霆時來一洗耳兩眼為君青有客過茅宇煮茶坐松風問亭果安在笑指十八公君看梁與棟豈不深且雄何必用斤斧然後成帡幪回環數株松老幹極落落清風一披拂竽籟自然作喧囂世俗事秖使人意惡誰能洗耳來相與憩寂寞清樾軒開軒在獨園繞屋得清樾不知何年樹殆為今日設牕扉落林影時復亂風月喧聲了不聞幽哢極可悦玉溪僧所廬無似許明潔頗疑三昧手斷取從二浙禪房花木深此語信佳絶何以落其成爐薰薦茗雪山房竹樹轉深徑茶山給孤園禪流打包去舊日單寮存堂堂十八公不知幾寒温其誰晤對汝冷落依頽垣有客占作室此公正當軒風聲落天半似與幽人言已矣復焉往佳哉略無喧在昔公擇父實惟謫仙孫讀書廬山中仰視五老尊頭白不歸來髙議排金門吾敢效前輩分應守丘樊何憂蕙帳缺悵望鶴與猿香寂圃陂陀茶山西草樹無空空呼兒鋤其荒花木亂栽種葩華以時折薌澤得風送眞成摩詰病幻出天女供游人等蜂蜨晴日競喧哄靈堅不自持玉隴紛一鬨誰知根塵間境界極空洞誠能返其流當見寂不動花飛已無蹤香過忽如夢于焉自聞聞爾乃得大用横碧軒幾嘗居孔雀僧院東廡小室榜曰横碧軒有諸公唱酬之作道山心已灰但有愛山癖移家過溪住政為數峯碧空濛梅子雨了不見顔色朝來忽獻狀欣若對佳客晴牕巻書坐葱翠長在側似為神所憐持用慰岑寂㑹登此山頭卻望水南北煙樹有無間吾廬應可識詠南池衡門久棲遲永日孰與儔既絶車馬喧遂適林塘幽荷香因雨來水鳥鳴相酬虚懐睨物表可以觀天遊古來英雄人何異貉一丘茫然不知歸沒世隨波流遊靈川縣水洞清溪東南馳礙此碧玉峯蛟龍夜相宅奮迅生雷風剨開兩貝闕鑿翠成珠宮坐令空洞處一水油然通泉流百道來投注萬斛鍾不知深幾許湛若鎔青銅定應天下稀豈但湘南雄嘉與二三子葉舟渺相從周旋乳蓋底蕩漾菱花中為我告行客無為苦匆匆小酌清泠淵洗汝塵坌胸漵浦縣鄧夢授主簿惜日軒羲和鞭白駒秋日淒已短向來曬書地欲作炙背暖鄧侯開西軒棗下歌纂纂前山隱半規悵望支手版我慵類天賦身世兩不管著鞭慙祖生運甓謝陶侃銅壺一百刻夜夢分去半午牕又為祟長閉讀書眼勉旃崇明德已事不可緩作詩非為君實自警疎嬾漵浦枏木洞蓋神龍所居今年夏大旱縣官乞取其水以禱立應民猶以為未足因作是詩以遺諸公致再請之意焉傾心南山雲如渴望梅嶺朝來有佳思拄笏不見頂豐隆駿奔走列缺元馳騁雨不到人間風伯乃為梗生來食官倉四海無二頃歌詩視天漢一念極耿耿階前甃清泉洮頮冰雪冷乾喉欲生煙空下百尺綆幽軒竹三四柯葉殊秀整邇來頭搶地但懼不得永以斯占稻粱生意魚在鼎潛虯民司命膏澤浸茲境邑官樹嘉政責報甚形影缾罌走十里豈憚一再請君其潔齋俟百穀正延頸客子無遠謀空腸望遺秉詠旱三首驕陽方施行秋節已樹立田苗在膏肓何道可副急雲雷不成雨成雨初不濕咄咄逼中秋為霖恐無及邦人奉教條久不知肉味潭龍不能神土偶安足恃應眞住蘭若雲雨可立致胡不迎之來明明有前事春雨接梅雨便有水潦憂乞晴今幾日又以憫雨求田苗雖向槁尚冀什一收政恐穫稻月沛淫不能休六月十四日大雨連朝黄金北斗髙何似六月雨舉頭看雲霄此祕初未覩今晨沛然下其勢莫能禦既蠲人鬱陶又長我禾黍誰言為郡樂病不對樽俎似為神所憐用是娛悦汝緇黄諠諷誦巫覡亂呼舞惠然從風來茲事一不舉臨民多秕政何道致如許稽首謝皇天傾心奉明主七月一日復大雨用前韻山頭一寸雲山下一尺雨青天在層隂未用遽披覩懸知壠畝間不著蓑笠禦呼兒趣秧稻喚婦催釀黍使君同戚休有味勝鼎俎似聞小人言無復怨詈汝行看黄雲翻不獨翠浪舞飭廚辦千觴飲客醉一舉不知城東湖今復深幾許鷗鷺莫相疑龜魚且為主夏雨應祈呈桂帥二首山椒雲氣佳林表雨聲急元戎郊坰去歸騎旌旆濕老夫不能陪凉傍竹牕入兒報夕陽明環城碧簪立牕前有梧桐報我以好雨不眠聽疎滴佳事想農圃苗根不須問蔬甲已如許小簟六尺牀蕭然睡亭午寒雨浹旬終不成雪幽棲又三冬好雪無一片今晨靄同雲薄暮集微霰先聲乃如許落勢大可見呼兒出門看通夕知幾徧聽牕復聽竹攲枕不知倦終然成底事寒雨閉深院何嘗憂瘠田初不辦歡醼囊螢已乾死無以映書巻請天收層隂斗柄行欲轉愛日上晴軒如披故人面喜晴求晴而得晴老子不勝喜夜聞屋瓦聲如疾痛在已通宵遂無寐落勢殊未已禾頭臥沙泥便恐欲生耳謂天為不仁春夏雨如彼即今孰主張秋潦更如此埀成又敗之天意定不爾果如吾所料林杪風忽起𤣥雲走四山白日行萬里腰䥥知幾家持杵者誰子歡聲田野閒樂事圖畫裏使君經旬憂桮酒為一洗官倉不須問百室既盈止作詩告同僚可以賀我矣初至天台疇昔所欣慕天台冠坤靈興公妙摹寫粲若披圖經自憐嬰世網仰愧鴻冥冥夙契諒非淺半生吏金庭成此一段奇得按東吳刑又分臨海竹想像山圍屏稍稍向鈴閣行行叩禪扃一丘與一壑所見皆所聆石梁臥劒㦸布水驅雷霆五百大開士神光秘林坰于我定不薄是事初無形寒嵒二隱者在眼誰能青庶幾閭丘守胸次明渭涇向來石磵耳鬭訟終朝聽淨洗塵俗狀數上參雲亭聞東湖荷花盛開未嘗一游寄鄭禹功言登巾子山天外入眼界呀然城之東一鑑如許大得非所領州其下臨渤澥乃知湖浸闊便覺井邑隘朝朝横烏紗暮暮束韋帶何曾官事了秖使人意敗徑須水清泠一洗胸芥蔕昨來放船好如更宅爽塏四圍純浸山碧玉亂石黛兼隨鄭廣文人境兩疎快維揚幾同僚獨喜此翁在只今萬紅妝一一倚青葢柳隂閒畫舫荷葉遶公廨鬢絲禪榻上句法出蔬菜因之雙鯉魚愼勿欠詩債茶山集巻二
