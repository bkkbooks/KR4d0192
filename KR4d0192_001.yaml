body:
  text: 茶山集卷一宋曾幾撰五言古詩尋春次曾宏甫韻案曾宏甫名惇避宋光宗諱以字行紆之子鞏之姪孫陳振孫書録解題曾氏三望最初溫陵公亮次南豐鞏兄弟其後則幾之族集中贈宏甫必冠以曾蓋以明同姓不宗之意春山數峯青春水一溪緑幽尋山水間物物可寓目花香若三薰栁色若新沐吾儕幸間放晴晝頗連屬胡為深閉門終日仰看屋嘉招儻亟拜豈敢憚僕僕請君攜壺去政恐日不足小槽雖蜜甜何必待醽醁茗事姑置之雷車困枵腹宏甫詩有家貧只舊醅不辦樽中醁但煮官焙香炊飯鱠魚腹之句且云家釀甜甚不堪饗客也次范益謙遷居九江經過上饒見贈韻君為九江行意有風雨快維舟玉溪畔未割故人愛停杯一問我請以所聞對九江萬事好賞詠看前輩巖巖匡俗廬案後漢書郡國志注釋慧逺廬山記略有匡俗先生出殷周之際隱居此山時謂所止為仙人之廬而命焉又案豫章舊志匡俗字君平夏禹之苗裔也原本避宋太祖諱作正俗今校改頂踵極高大其中藏曲折願勿遺瑣碎煙波湓浦遊風月庾樓會以兹供筆硯安得有蕪纍矧君著幽禪直欲入三昧飽參山南北毋問人顯晦歸來亦何云聖處果何在要知方䇿間即有文字外我今如是説初不墮荒怪屋漏實臨之斯言尚無愧次陳少卿見贈韻少卿令德公不肯入州府種花養風煙藝木蔭庭宇了無適俗韻真可與晤語永懷君詩句少卿詩説往時行朝以雪句唱和淨洗我塵土如何百里問此祕欠未覩今晨款荆扉老氣壓方虎新詩疾雨風妙字列行伍華宗有后山句律嚴七五豫章乃其師工部以為祖君方討淵源奚啻窺牖戶我貧無一錢不敢學農圃空餘數卷書腸腹自撑拄陳卿又和三首而仲通判亦三作嚴教授再賦皆有見及語豫不可以無言故復次韻官屬邃中書朝班高太府陳卿二太原府兼中書檢正陳卿棹臂去偃仰一茅宇臨池看魚樂坐樹聽鳥語修竹手所栽薪萌爭上土天開重新運聖作萬物覩會合如風雲吹噓者龍虎陳卿落間處問孰與為伍毛穎傳中人渠儂適成五詩章出咳唾流派考宗祖仲嚴更獻酬胸次非小户覽觀不暇給爛若花藥圃可畏韻險艱浮梁裊相拄案此句用杜甫龍門閣詩全句原本裊誤梟今改正沈明逺作哲教授用東坡仇池石韻賦豫所蓄英石次其韻維南有絲溪溪石如水緑瞻相百里間抱負一夫足聲名作災怪攻取及背腹在者略無竒溪神為顰蹙蠻煙瘴雨地故舊實州牧坐令數峯青飛過大江瀆何嘗説向人恐類和氏玉公然遭奪攘不使得藏伏廣文到吾廬索隱妙蓍卜東坡韻險艱句句巧追逐幽人所好山已占一林谷又兼小崢嶸無乃太多欲端如耐久朋相與會心曲大勝輕薄兒浮雲變何速次緑字韻舍前南山青舍後北山緑捫蘿涉其巔䇿杖繞其足中間竒絶處表裏見心腹登臨豈不佳老境日以蹙誰知怪石供能坐我郊牧政應索幽遐何憚越川瀆嶔崎庾嶺南美者色蒼玉賞音無東坡尤物多跧伏仇池嵩南石也今年致書求屢以可否卜故人為遣送健步逺相逐雖非古仇池要是好崖谷似為天所矜此段獨從欲深慚舁致重路轉知幾曲安得滄海神鞭笞使之速還守台州次陸務觀贈行韻蟬噪高栁岸鷺飛逺沙汀蕭然感豫懷清靜遊神庭老樹失故緑殘芳謝微馨胡為趣召節日日晨昏星放纜西興渡落帆浙江亭恭惟陛下聖萬國瞻儀刑黼座懸日月孤燈耿熒熒况復如許病自知不能廷所以乞間散庶幾守沈冥方虞秋霜嚴翻得春露零再聞藝草香一洗海物腥父老喜我來無異化鶴丁兒童喜我來小駟騎青青諒有隔生契不然定誰令四海習鑿齒幾年讀書螢新詩中律吕雖美無人聽鳴聲勿浪出坐待軒皇伶次折仲古避寇潯州韻我持十口家不辦一葉船賊聲日夜急欲濟江無邊身雖墮眢井仰視猶有天天理儻未爽偷兒浪埀涎洗心占羅池稽首依靈泉竟以妻子免百神果昭然得從潯江遊未斷龍城緣為問米何如買禾可論廛向來魚菜市十户八九旋令我喜折屐喜定翻悲憐王師靜江南趨者人摩肩一日百回首我非強項宣盛欲徑梅庾不然傍郴連終鮮孔方兄留滯等謫遷尚念吾鼻祖永懷舊山川往還武城居家風到今傳我方尋昨夢一舸百笮牽而公下劈箭案劈箭二字見韓愈嶽陽樓詩原本箭誤剪今改正如駔駿得鞭江村索居地未敢高枕眠世事公等在歸與有逢年次雪峯空老韻二首雪峯僧中龍此道誰與共蕭然兩伽陀不舉似大衆獨貽茶山老以當蒲塞供巖花與澗草信手拈來用獨烹茶山茶未對雪峯雪須知千里間只共一眀月陳家參玄人道眼應一瞥為語管城君相從熾然説贈疏山清老江西草堂清道價直寰宇中分死心坐親飲晦堂乳與人作隂涼雨後散煩暑千林搖落後鬱鬱松柏古厖頭覆霜雪碧眼照針縷貫穿禪家流領略我輩語居山専論道餘事百不覩人言師疏慢我但見媚嫵去年瀟湘來叢席歷幾所踞堂號知識説法若雲雨隂求乃翁事未見一人舉請師長住世此道要盟主杖拂有餘間時時入州府贈空上人我搴空門秀得之古疏山斯人器玉壺中有寶月寒四壁淡相對安身一蒲團玲瓏六窗靜竟日心猿間時從禪那起遊戲于筆端當其參尋時恣意雲水間松風潄齒頰蘿月入肺肝政使不學詩已見詩一斑況復用心苦俗氛何由干今晨出數篇秀色若可餐清妍梅著雪圓美珠走盤乃知心鏡中萬象紛往還皆吾所現物摹寫初不難誰能效我輩造語出險艱請師賸汲古淨洗蔬腸酸坐令韓退之收斂加巾冠送祕丞羅庭揚孝芬將漕湖北湖南八九州海內清絶地與公白雞年案白雞年謂酉歲本晉書謝安傳接翼鴻鴈使高堂親八十無復逺逰意奉承萬事了趨走三節至詔書引上殿帝曰汝國器置之蓬萊山身亦典中祕乖離如許久會念差足慰胡為未暖席歸與不可制人生故鄉樂況攬澄清轡皇華遣使臣光采寧有是紅塵跨鞍馬老矣殊少味著鞭輸公先吾亦從此逝贈趙判官夀卿彥齡二首身為高帝孫面作寒士氣緣情德麟語寫物大年意青雲無蘇黃何以致後世窗明几靜間是事且遊戲得州敢為榮得士乃足詫此郎精琴書不獨妙詩畫雖云于小道舉不在人下無乃太不廉誰知非譏罵趙能詩畫篆隸撫琴王巖起樂齋歡悰挽不來愁思推不去達人方寸地固自有樂處得非山林歟或用詩酒故一朝不在眼便覺少佳趣人言顔子樂瓢飲映蔬茹何曾夢見渠浪自起欣慕此君與天遊于物初不寓攜持小齋名扁榜隨所住要知真樂事未省離跬步我亦欲睎顔案睎顔二字見法言學行篇原本顔誤彥今改正從君尚能屢題張彥實舍人墓下湧泉亭紫薇花底人去作泉下夢佳城閉青春風木號永痛寒泓孰出之甘冽可抱甕乃知主地神效此清淨供汲引入中廚色味勝乳湩老龍來試詩事有萬鈞重程伯禹龍閣命名作詩寄聲松大夫并語石翁仲俱修護持職以遺雲來用題盛彥光少府丘壑軒何許覓丘壑不専在山林胸次儻蕭散市朝有幽尋只今謝幼輿超然抱遐心俯仰得佳趣何嘗日登臨我雖非夔曠粗亦能賞音不用一再鼓山高水深深題黃嗣深家所蓄惠崇秋晚畫叢蘆受風低積潦得霜淺沙勻洲渚淨水淡鳧鴨逺禪扉掩晝夜短紙開秋晚欲問此間詩半山呼不返題程伯禹給事漫吾亭漫郎専一溪萬事俱不理胡為墮我相名字出竒詭山林軒冕歟等是寄焉耳程公榜亭意道眼深照此端居亦偶然小出聊復爾宣城幻事了郤夢歸故里結廬澄潭上盡室清鏡裏木陰涼夏簟荷氣馥秋水遙岑招不來為我列窗几昔吾與今吾念念如脫屣心期次山外人要安石起公勿賦逺遊行應去天咫題南嶽銓德觀秋聲軒月明鴈呌逺露下蟬號寒幽幽草蟲泣索索梧葉乾愁人知秋早聽此良獨難竹君南北美佩服青琅玕天風一披拂庭宇聲珊珊靈宫蔭老樾别館如深山心淨鑒止水眼明揖千竿虛籟自然奏有琴不須彈世議大可厭市聲無少間不如聽君語竟日簾埀間題臨川宰徐伯章心逺軒徐侯心萬里身墮百里中政以詩禮庭上有鶴髮翁豈無敲榜喧不入丘壑胸開軒寄逺韻几淨窗玲瓏竹影落夏簟水光搖秋空一對鳧鶩行萬里牛馬風悠然見南山不與俗眼同徐侯歸去來三徑資已豐身將心共逺勿為督郵恭春初過王仲禮教授小園幽居倦孤寂俗駕難追攀相攜笻九節徑造茅三間王卿貧無事况得獨冷官衡門靜如水委巷深于山自言學為圃雖小殊可觀始至度略彴徐行轉闌干當階藝紅藥坐待青春還春還未數日草樹猶清寒殷勤小梅花一笑氷雪顔煮茗當酒醴言詩替吹彈君知靜中勝得此良獨難相戒勿浪出黃塵點人冠汪惇仁教授即官舍作齋豫以獨冷名之昔君困虀鹽蓬首窗下讀秋螢屢乾死明月以為燭麻衣肘欲穿才換一袍緑豈知冷淡債十載償未足書齋開冰廰敗壁數椽屋橫經綴鵠鷺未省進鳧鶩窮通更事耳裘扇有反覆直今張羅地便恐車擊轂先生粲可流示現著冠服從渠勢炙手了不見涼燠小詩應大笑笑我未忘俗董令升舍人朋溪圖趙祖文筆也谷風不須歌朋友道缺絶請歌伐木詩歌罷聽吾説漢朝儒宗系今代侍臣傑甘泉久論思陽羡小休歇郊園谷幽幽喬木覆清樾百禽鳴其間相喚極可悅坐令公感慨朋好苦難結不如侶荆溪迥與世情别淡乎若無味了不見涼熱是以樂從之諸峯况羅列趙侯有能事短紙藏曲折更作陶淵眀飄颻弄明月相馬圖呈杜勉齋左司造物出萬類貴賤伊誰分圭璋雜瓦礫世道同疏親既收大宛種一掃駑駘羣乃觀相馬圖低首先吟呻千金購死骨舉國無其真生死何太晚鹽車負艱辛悠悠虞阪道赤日煎紅塵行人亦何多具眼惟孫君一顧不旋踵價越連城珍誰為繪此像庸示將來人相馬失之瘦相士失之貧于兹有巨公數載居沉淪涵養浩然氣輪蹄任紛紜素識太平相鶚表飛青雲紫泥日邊下八座生陽春攄心握文柄引年啓賢門凝睇辨臧否立志安斯民他時了經濟丹青畫麒麟回顧相馬者細務何足云寥寥載千古二道非同倫相士今何人少陵身後身紹興帥相湯公會五客蓬萊閣登望海亭屬某賦詩徐稚山朱新仲王宣子胡周伯及某赫赫會稽郡潭潭府公居一州勝絶處畢集于庭除秦望極高秀千峯散江湖蓬萊為收攬逺近爭奔趨溟渤無百里登臨失東隅翬飛卧龍頂便可窺方壺丞相不獨饗故人盛招呼兵厨列樽俎賓次羅簪裾傑閣坐褫帶危亭上肩輿耄倪爭指似還見雲間無一月明白璧五星燦連珠鄙夫何足數愧汗沾霜鬚客有徐季海題名數行書怒猊抉石外筋力顔之徒周老盍命駕屬聞遂懸車何妨行役事政用兒孫扶陸務觀讀道書名其齋曰玉笈自生民以來未有夫子盛六經更百代略不覩疵病瞿𥅆書角立亦各談性命空門甚宏放果報駭觀聽是以雖至愚讀者無不敬周時柱下史設教本清靜至今五千言談若鼓鐘磬雖為二郗諂秖作二何佞遂令黃冠徒冷落度晨暝賢哉機雲孫道眼極超勝殺青貝多葉收貯腹中竟慨然發琅函窗白棐几淨三家一以貫不事頰舌競吾皇漢孝文恭已民自定願君益沈涵持以奉仁聖逺師曹相國下視劉子政喜得洞霄乞身知才疏從容荷主聖叫閽如杜宇不謂天亦聽除書入手來一洗百念靜復疑是夢中驚喜久乃定尚餘折腰米敗我生塵甑要令襟見肘始與家聲稱今兹火用事日永南風競林下聽中興姑容老夫病喜天遊二十一兄至亳社時同叔夏十六兄作登高望南都雉堞疑可數城中人不見百里等燕楚我無簡書畏自笑誰縛汝東風送兄來下馬逼三鼓迎門閙兒童羅拜欣欲舞花枝應亦喜紅幞已微吐聊為文字飲一洗别離苦别離何足云千載成仰俯要知靜中趣回視今孰愈焚香默自照下此一轉語鈴閣老師兄當為君去取言懷貽寓居郊居麥風涼佛屋梅雨潤縈簾一炷香隱几百念盡時從黃卷語坐看青燈燼昏昏花亂眼種種雪侵鬢懷哉佳友朋久矣闕親近其誰破愁寂令我生鄙吝及間當過君請以茗碗進言詩固不能把酒亦無分坐睡竹窗納虛明棐几亦滑淨幽人坐清秋倦對古賢聖丹田閲千息一氣忽空靜豈期黑甜鄉于此得棲徑倒牀未必佳邂逅乃復勝覺來欠伸餘兩眼半開瞑吾身竟何許神意久方定從此謝衾帷蒲團日相倩茶山集卷一
