body:
  text: 茶山集卷三宋曾幾撰七言古詩春晴青春挽留渠不住白髮拋去吾安能東風送汝一杯酒從此閉戶真同僧酴醿芍藥待判斷腰鼓橫笛當施行奈何但效鵓鳩輩竟日討論隂與晴王元渤自湖楚歸贈之南池荷葉疊青錢玉山門外君著鞭南池荷葉成青繖問君東遊何當返聞道湖州又楚州舊隱故鄉宜款款清晨剝啄叩我門我不出門非是懶不知何物苦相干能令人熱令人寒偶然脫命冰炭裏至今體不勝衣冠溪流落盡才如帶想見南池空聚塊更無小鴨睡枯荷況有紅妝依翠蓋眼看物變惜年光明月黃花盍舉觴知有中秋恐無分須君滿意作重陽贈閻德夫參議閻公才氣人無敵列星官曹聲藉藉青雲埀上卻回頭笑説鄉邦富泉石問君功業男兒事禹重寸隂輕尺璧及身強健不勉旃汲汲東臯恐非䇿答云種木須十年種得成隂已頭白是以江濱五畝園拄杖芒鞋日經畫即今臺榭數十處花竹誰能計千百是中便足了一生頗覺軒裳總無益我聞此語為驚歎耆境之間真迫窄案耆境二字不經見考説文耆老也又至也蓋言已至老境元無三徑可就荒乃知貧過陶彭澤想君舒嘯東臯上不但淵明心莫逆神交又得王無功一飯何嘗留俗客未妨獻納雲臺表著繡晝行尋履迹會當稱是好林塘門對諸峯一區宅次鄭侍郎臥聞秋風韻茶山石燥泉亦枯草樹疊疊成樵蘇天公風雷起揮袂咳唾急雨紛跳珠我詩曽未管窺豹況有文采如於菟勤公見索掃地無公自瑤碧瑲華琚再次蘇字韻秋風不來眼穿枯颯然而至吾其蘇中宵起我燈火讀音節自喜如連珠不知何物披拂此定是嘯谷之於菟窗前況復雨驟作山溜繞屋鳴瑤琚三次蘇字韻陶詩雖瘠元非枯確論近出眉山蘇君詩不贈世作者以暗投我如投珠鄙人摹寫不成就妄指畫狗為於菟安得才似柳刺史好辭玉珮鳴瓊琚次程伯禹尚書見寄韻往年書到西風涼病夫隨牒天一方今年書到玉溪上曖空白露為清霜人生俯仰成陳迹只有一丘如宿昔故鄉傑閣公飽山程所居閣名野寺幽軒我橫碧豫所寓軒名名交曉月長庚星勢交飛絮水上萍往時玉溪二三老死生貴賤論交情歸來訪舊其誰羡程公筆力猶強健鄭公霜鬢未成絲挂冠不受兒曹勸鄭顧道也程詩及之公于道德猶耕獵所得不隨天下裂胸中具眼世莫知筆端有口公能説豹文未省一斑窺戲逐羣兒日課詩詩病無人與商略湔腸浣胃付神醫次僧道規蜜蜂去而復集韻公如老殊所嗜蜜種花山中引蜂入千門萬户芙蕖房為公謀食如風狂朝來蜂臣不趨衙一心祝蜂早歸家歸來喜舞擊銅鉢與人從今莫胡越吳傅朋出遊絲書求詩使君官事間時書略取萬象隨指呼空中遊絲定何物非蠶所吐仍非蛛光風霽日青春暮惹草縈花細于縷君今幻出一毫端此祕從來人未覩鈴齋觀者客如雲有無斷續吁難分不知誰束此毛頴能使字畫纖無倫嘗聞掃堊生雪白顚草親承擔夫力世間妙處不可傳心手應時須自得和劉聖俞顧龍山約客韻詩筒四出走中涓詩句萬選如青錢曰余借舟期七賢共嗅梅花咀芳鮮津頭幾度喚長年晝眠乃若經笥邊舉頭急雪風中旋瞪視不見山之巔八窗玲瓏繡佛前同來且結西方緣小軒宛若壺中天玉琴不斷雨聲傳諾君再宿余敢愆從君索句發春妍肇慶守鄭子禮以李北海石室碑見寄輒次山谷老人韻為謝吾評古法書固自有髙下端州遺我石室碑一字千金恐非價莫邪之劍難爭鋒李公落筆神氣同詩鳴一代屬山谷草根亦復吟秋蟲黃嗣深尚書自臨川省其兄嗣文户部于宜春用元明魯直唱題李生墨竹梅紛紛畫手調紅緑好以桃花配叢竹豈無短紙作江梅雪裏溪邊太幽獨李侯胸中有佳處研滴松煤聊寓目與梅擇對無可人分付此君真不俗淡煙小雨空濛地何得月明疏影足始知璀璨出斜枝詩畫古來真一族東坡梅詩竹間璀璨出斜枝探梅幅巾芒鞋笻竹䇿踏遍山南與山北雪含欲下不下意梅帶將開未開色繞樹三匝且復去前村一枝應可摘丁寧説似水邊人從今日報花消息許公華遺潘衡墨云其女所造也潘公之墨東坡訣只今有女能傳業許郎來自大江西手探玄圭出箱篋摩挲熟視家風在款識明明筆竒絶見渠顔面得渠心湛如瞳子堅如鐵晴窗大几石泓淨未忍磨研令小缺冷金玉版姑試之一點清光初漏泄廷圭去人端未遠餘子何勞定優劣健婦果勝大丈夫從此廬陵是黟歙款識瞳子冷金玉版廷圭事皆東坡説也謝胡帥餉酥虎頭骨相生來無談天吻燥齋腸枯欲從底處覓膏潤凝香燕寢烹牛酥鵝兒黃拂冰肌膚關中穰下遠不如已令炊餅作十字今晨盛饌非伊蒲謝柳全叔縣丞寄髙麗松花幽人所住空山裏老松皆作虯龍起但知樹底聽松風不見風前落松子三韓華萼手自開其間瑣碎如嬰孩請因賈客詔君長二十餘年無使來㔶甕酒辛未歲吳儂餅麴成村酒所取何嘗議升斗一杯未盡朱顔酡過若茅柴那得久官酤私釀同一律竟識吾家新醖否近持方法報山妻入眼從來未曾有舊時菽麥真其父秫稻麥和以為母東坡酒子賦米為母麴為父甕頭又戴老瓦盆墐塞四旁如戶牖數朝已辦糟牀注不論清濁皆可口欣然一笑謂山妻愼勿輕傳殆天授答云妙處須心得縱有此方無此手請君痛飲當解酲賢哉大勝劉伶婦蓮榭郎官一星幾時落乃在水繞山圍間幽亭野彴不知數青鞋庾菜何由間眼前突兀見蓮榭秋水泠然沼其下凌波仙子襪生塵露冷風凄微月夜願公清淨如遠公吾欲投合保社中冰雪肌膚攲翠蓋看花心似太虛空遊張公洞張公洞府未著腳向人浪説遊荆溪欲看直上翠羽蓋不惜扶下青雲梯徑風翻動土囊口暗水流出桃花蹊卻將深處問兒輩一夕飛夢窮攀躋禽聲不如歸去東皋上美酒提壺迎婦餉何妨脫袴著新衣百箔蠶絲繭如盎春泥滑滑未沒腰田間布穀初立苗牧兒喜舞麥熟也報答爾曹婆餅焦荷池名園中有十頃池一錢不用君得之菱荷枯折小鴨睡絶勝紅妝青蓋時蛙鳴莫作鼓吹想亦莫問屬官與私讀書之暇招客飲能有此樂非公誰次折仲古遊潯州桂園韻雞犬圖書同一舸老夫蕩槳兒扶柂潯江一繫欲生根夢下湖南向江左極知越俗留連客性不相投如水火是誰招喚寫羇愁拄頰西山雲數朵雲山下有園五畝不植側生旁挺果十年藝桂待芳辛歲晚風霜深印可有懷澤畔入騷辭配以蘭椒真類我斧斤竟不赦孤根問主林神安所坐乃知有用禍先集社櫟之徒最繁夥徑須澆下磈磊胸乞取青錢供白墮為張四明作一生所聞張仲蔚閉門蓬蒿深幾尺邇來伐竹聲丁丁手披榛叢待三益徑中踏破蒼苔色定是幽人芒屨迹莫將車邊兩輪赤奪此千竿一池碧時張有四眀之命馮縣丞墨花君持松煤與研滴慘淡不言生百物胸中自無俗子韻落筆乃有此氣骨江梅正爾不施丹為我拂拭為清寒一枝早晚到窗几定作月影橫斜看錢生遺笻竹斑杖戲作笻山美竹天下聞有客錢氏之礽雲自言吾祖嫌杖晚贈子九節斑爛文尋幽已得濟勝具傍險更策扶危勳同行安用木上座案此句本傳燈録佛日禪師見夾山舉拄杖曰惟有木上座同行耳又見蘇軾詩留我同行木上座原本木誤人今校改一日不可無此君夏初示兒曹鳥聲四合隂扶疏江湖散人拜賜初此君之子才墮地一一文采如於菟相看又作故時面乃是秋風篋中扇寸隂尺璧定何如付與爾曹分貴賤玩鷗亭乃翁獨步辭雲間五花判罷遊金鑾甘泉頗勞侍從事夜直必夢江湖寬晚遭忌刻泛湘水衆為不樂公欣歡白鷗無數沒浩蕩相親相近俄相安何曾一旦舞不下始信前事盟未寒文章炳蔚冠當代衣被諸子猶班班攜持扁榜向陽羡往日風味追令還乃翁間散莫浪許乃翁青紫當拾取回施佳名與老夫長共羣鷗臥煙雨獨青亭霜落水痕風落木翠蓋倚天惟汝獨是誰手種百年餘蔭此空庭一株足歲寒不但色青青上有埀絲下茯苓松根老僧應取此制人頽齡起人死題夀樟亭大屋連甍小容足棟宇以來非一木豫章不是十圍樗受命于天何得獨君莫厭老大蓬蒿間應龍虹梁果非福案第三聯係長短句原本虹字下脫梁字考西都賦抗應龍之虹梁詩蓋用其語今校補虛堂晝靜聞丁丁溜雨枯皮在空谷蚊蠅擾甚戲作黑衣小兒雨打窗斑衣小兒雷殷牀良宵永晝作底用只與二子更飛揚開尊匕箸須一洗破卷燈火尤相妨從來所持白羽扇自許百萬猶能當安知手腕為汝脫以小喻大真成狂揮之使去定無策葛帳十幅眠空堂朝喧暮鬨姑聽汝坐待九月飛嚴霜同鄭禹功登巾子山天台鴈蕩天下竒豈不欲往官縛之巾山只在郡南郭曾未著眼真成癡今晨排遣簿書了往赴鄭老同幽期羊腸轉盡得蘭若飛鳥不到雲雨埀青銅鏡外翠屏繞中有萬屋魚鱗差古來二事不兼得此地一覽俱無遺蓬萊方丈果何許雲駕飇馭知為誰赤城風月幸好戲驅取鸞鳯相追隨茶山集卷三
