body:
  text: 茶山集卷七宋曾幾撰五言絶句題東臯市聲俱不聞野色良可喜聽公北宅住還我東臯子西崦一重仍一掩少有外人知杖屨歸來處斜陽隱半規南埭薰風追晚凉愛日引朝步瘦策與青鞋應知來往路北垞不謂蕞爾邦有此巋然宅江山自比鄰風月相主客松溪不似居城市澄湖上有松日斜人影散百尺臥蒼龍竹塢煙雨百餘年茅茨數間屋中有在家僧蕭然如此竹梅坡被雪一枝好令人雙眼明未須貪結子對汝不勝清蘭畹深林以薌名花木不知數一㸃無俗氛蘭芽在幽處叢桂行攀叢桂枝坐息叢桂影王孫胡不歸歲晏雪霜冷海棠洞玉頰酒潮紅醉頭扶不舉杜老豈無詩應為六丁取柔桑陌南陌緑成陰園林正春老能令蠶事辦更遣梟音好梨花原酒渴上安市甘寒為解圍鵝兒黃不見空見鷺鷥飛柑子園小摘亂青黃開嘗馥香氣持比千户封真成敗人意山齊頗知藏曲折故作小崢嶸一穟香已過半山雲正橫泛宅薌林新賜宅春水向鷗前不是蕭何第元非范蠡船上饒方君小倅官而不婚宦居偏戶間靜無官宦之事舍後梯城而上即棚為亭盡得溪山之勝名之曰快哉為作四小詩以快哉此風為韻簿書苦沈迷世俗嗟迫隘不如溪山上風至取一快掾曹官事了載取麴生來得酒且歡喜俗氛安在哉從容吏隱間游戲僧俗裏孤月浪中翻吾心正如此逼仄何逼仄官居塵土中高城與隔盡惟有一溪風遺直堂并序三孔某之舅氏也伯舅舍人熙寧間實為台州從事手植檜于官舍之堂下逮今八十有餘年矣某假守是州因以遺直名其堂作詩六章用叔向古之遺直為韻以告來者庶幾勿翦焉三孔吾渭陽猶及見仲叔堂堂舍人公再拜但喬木長身一庭中徑氣九霄上思公立朝時凜凜不可向策登董相科賦作長卿語劉牢出外甥愧我不如古老柏蜀人愛甘棠召南思領客清樾下作詩詠歌之元祐幾閲歲諸公一無遺吾舅典型在神明力扶持柏葉松其身在時公手植雜樹誰所栽一錢初不直同官皆和復次韻蒼官可長雄餘子皆季叔所以吾外家深栽後雕木高標何許看小閣有時上烈風知人懷柯葉盡西向州治小閣實與推官廳為鄰孔父昔所遊父老不能語文章翠珉上如此樹高古台州修城記兒氏之文也寂寞西州路淒凉渭陽思敢不酷似舅蒼官實臨之大厦要直木郢斤棄如遺一朝諫省上王魏不支持舅氏應直言極諌科中之緣力詆新法忤時相意罷歸故官元祐中擢大諫華屋落山丘悲歌詠曹植故有主林神百年依正直玉井茗飲貴石泉江流亦其亞甘寒如此井未肯出汝下碧蘆潨春風桃李蹊學語鳥相喚不可無寒蘆汀洲下鳧鴈通幽花徑一徑夾青葱無人到幽處花發曉鶯啼欣然得佳趣虎川水紋如此云嘯壑有於菟吹波作奇字川上雪髯翁文章政相似放魚磯一絲公不掛釣餌也憐渠舊日埀竿地臨流只放魚三老亭華髮纍朝人蒼髯幾時樹政恐郢斤尋明堂要材具題摘蔬亭幽畦小雨餘一一錦繡段春日細春盤懸知咄嗟辦題退軒求名恐顛隮求道戒進取誰知郤行人可以超萬古題無熱軒一溪喬木陰六月火雲冷門外有行人寒泉思汲井寄軒人家愛吾廬燭理均是寓未辦山林居聊依佛僧住企疏堂薌林未置身泛宅先入手二疏歸來時能似今日否羃翠庭羣木上參天清隂併為一炎曦無路來不廢風月入醉石冷石磨青瑶客至相與飲醉倒不用扶真成一高枕墨坳有水碧于天𤣥雲滃然起定是臨池人一沐管城子駕月橋伐木梁清淺扶藤日幾回嫦娥與牛女昔日度橋來過花橋溶溶水拍隄了了花隔岸不著小橋通令人方寸亂歸來橋吉安府志橋在廬陵縣治之北安車過橋時童稚皆喜舞題柱作歸來元無長卿語草一兄以手和四清香見餉用心清聞妙香為韻成五小詩微雨久逾潤禪房低復深下帷香一縷收盡向來心花覆春風殿爐薰上紫清舊時香案吏趺坐對煙明不屬蔚宗傳又非知見薰從來香一瓣只許自聞聞擬去竹塢間煎茶炷新料從容二士談領㑹一語妙老柏參深水封題遠寄將發奩知長者閉閣自調香華嚴經鬻香長者六言絶句李商叟秀才求齊名于王元渤以養源名之求詩自古詞林枝葉皆從根柢中來萬卷須窺藏室一塵莫㸃靈臺老杜詩家初祖涪翁句法曹溪尚論淵源師友他時派列江西學問直須富有文章政要深藏玉在山中輝潤蘭生林下芬芳廣南韓公圭璉舶使致龍涎香三種數珠一串戲贈千里傳聞陸凱一枝遠寄梅花虎節無煩驛使龍涎走送寒家花氣薰肌郁郁貫珠入手纍纍想見范公和處絶勝乃祖偷時黃嗣深尚書自仰山來惠茶及竹薰爐茗碗中超舌界薰爐上悟香塵坐我集雲峰頂對公小釋迦身黃嗣深尚書見訪騎氣初占客至履聲忽報公來不亂空庭鳥雀何妨滿席塵埃茶山集卷七
