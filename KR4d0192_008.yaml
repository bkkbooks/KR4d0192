body:
  text: 茶山集卷八宋曾幾撰七言絶句乞梅曾宏甫二首尋梅不惜上南坡傍險衝泥奈老何寂寞僧窗禪榻畔好枝還解送人麼臘前臘後無非雪溪北溪南併是梅知有家山難覓路敢煩健步送春來覓梅欲尋梅去不禁寒宜著書籖研滴間聞道南坡開似雪略分疏影到茶山消梅花未見枝間著子初聞名已療渴相如花肌自是冰和雪那得生兒不似渠黃香梅雪裏何人作道裝冰綃重疊色鵝黃染時定著薔薇露雨洗風吹故自香尋梅至楊家見數株盛開芒鞋竹杖尋梅去只有香來未見花村北村南行欲遍數株如雪小民家落梅玉頰香肌委塵土雪魄冰魂無處所一年春事頓成空不必飄零似紅雨墨竹梅的皪江梅竹外枝能將幻法轉生機憑君莫作風垂緑便恐飄零學雪飛水芭蕉寒泉中有小崢嶸種得芭蕉積漸成一葉似抽人不見坐窗頭白眼猶明鄭侍郎家瑞香花盛開而未賞戲贈二首瑞香花發去年枝愜對君家白玉池玉池鄭酒名復幕重簾開欲遍馨香少有外人知移春小檻緑樽前記得花頭數尺圓傳語鄭莊修故事錦薰籠畔過年年諸公次韻豫復次韻二首瑣瑣紅英密綴枝春風春物不差池諸君但辦樽前去昨夜燈花報客知梅花過後杏花前嫩蕊裝成一蓋圓惱亂春風為渠了幽香破睡有明年曾宏甫見過因問訊鞓紅花則云已落矣驚呼之餘戲成三首茶山老子竟成癡漫說尋芳去不遲浪蕊飄殘猶自可名花落盡不曾知不令老眼看鞓紅豈是青春不負公尚有揚州風物在亦防此段併成空南渡年來兩鬢霜牡丹芍藥但他鄉即從江水浮淮水便上維揚向洛陽置酒簽廳觀荷徐判官攜家釀四首緑水波深欲上階紅蕖香動要傳杯幕中自有兩佳客又載青州從事來鄣日青圓自擁階皺風緑淨可添杯被花惱處君知否羅襪凌波笑不來白白紅紅花映階髙髙下下葉成杯嬌嬈似不禁長夏故就團圞扇影來休看紅藥詠翻階極目荷花照酒杯靜濯明妝何所待風標公子逺飛來謝送蠟梅二首天將何物染江梅白玉花成栗玉開一種暗香全似舊小罌和雪送春來化工團蠟作寒梅絶勝牛酥㸃滴開不是前村深雪裏蜜蜂應認暗香來鄭侍郎送蠟梅次韻三首折來梅與句爭清強和餘音本不能欲向都官論一字略無佳處似詩僧用前村深雪裏昨夜一枝開事小瓶梅映短檠燈幽興何人似我能枉沐歌詞無用處維摩詰是在家僧鄭有念奴嬌詞江梅難以蠟妝成女手雖工未必能香氣惱人眠不著若為學得定中僧曾宏甫餉溪山堂南坡胯新茶溪山堂在南坡曾所創也以是名茶胯云溪山寶胯能分我不但禪房破睡魔便覺胸中有丘壑免教辛苦上南坡衢僧送新茶齊腸得飽又逐去午夢欲成還喚回定是僧家不堪此滿奩青箬送春來紹興帥相公遺小春新茶且折簡云對瑞香啜之大勝暖帳中飲羔兒酒也小詩兩絶以謝打門將軍得人驚十月茶牙照眼明漏泄春光凌雪色柳條萱草太遲生酒壓羔兒雪煮茶紅羅斗帳錦籠花中書堂上權衡手小物勤公定等差啜建溪新茗李文授有二絶句次韻北焙今年但取陳草芽過了二分春為君湔洗丁坑後寶胯雲團一樣新壑源今日為君傾可當杯盤瀉濁清未到舌根先一笑風爐石鼎雨來聲謝宜春宰黃時舉惠冬筍二首此君老去猶停雪稚子生來亦耐寒記得長蔬山谷老三珍錯落粲同盤山谷謝游景叔惠冬筍酥梨詩三珍同盤乃得嘗竹底春從雪底歸煩君抱送玉嬰兒白頭無復迎船喜只供江魚作許悲老杜送王判官扶侍還黔中詩青青竹笋迎船出白白江魚入饌來用孟宗姜詩兩孝子事謝路憲送蟹從來歎賞內黃侯風味尊前第一流秖合蹣跚赴湯鼎不須辛苦上糟丘食淮白魚二首十年不踏盱眙路想見長淮屬玉飛安得玻瓈泉上酒藉糟空有白魚肥帝所三江帶五湖古來修貢有淮魚上方無復蠙珠事玉食光輝郤要渠食酥二首貢包分自浙西東函谷金城在眼中泛酒煎茶俱愜當滿前臘雪化春風土酥絶類穆家兒好著崔家飣坐梨如夢甘寒千百顆雪肌相伴出關西食楊梅三首年年梅裏見諸楊火齊堆盤更有香風味十分如荔子何妨盛著絳紗囊一月如繩雨瀉簷只言新竹漸多添豈知政負幽人腹不放楊梅蜜樣甜今歲以積雨故此族不佳饒陽接種江南少越上楞梅天下無梅熟應同兒輩喫有兄八十住東吳小饒接梅山隂楞梅皆珍果也食牛尾貍生不能令鼠穴空但為牛後亦何功不如醉臥糟丘底猶得聲名異味中謝寄端硯四首我居南楚君南越遣騎持書致石泓未識松煤先一笑向人鴝鵒眼能明名聲藉甚端溪硯何況珍材琢下碞頴麝煤俱愜當使君裁鑒果超凡端守鄭子禮治中長嘯得石硯乞與衰翁一笑開小試松煤便終日必知渠是下碞來管城子挾秋霜氣絳縣人含松壑風不是端溪石居士分甘棄置一生中端倅韓少汲謝鄭侍郎餉酒二首尊中政爾空空然忽有一壺來眼邊君知情快何所似石澗怒流深夜泉鄭堂後有流水曰石澗鳴鞭走送徒紛然開嘗政足甜中邊甘辛未省有如許氣壓爛柯山下泉三衢酒名不老泉家釀酒鄉四首惡懷種種占胸次俗物紛紛遮眼邊知有醉鄉無路入竹渠昨夜響山泉酒泉郡郭果何在校尉兵廚安足求即使愁城攻得破䇿勳當拜醉鄉侯醉鄉即是無何有歡伯相招歸去休全以箇中為境界更于底處覓溫柔醉鄉論石仍論斗如此山重水復何我覺去人殊不逺從來杯勺不能多讀書四首黃卷中人最起豫病來相對卻成疏新凉試傍青燈看猶有飛蚊小未除童子區區攻一藝老生汲汲事三餘偶然領㑹忘言處只有淵明解讀書朝游夕泳一窗書只要今吾勝昔吾未識此間真氣味直緣聖處少工夫勿謂微言久絶絃六經正用此心傳假令壞壁無餘燼日月堂堂故麗天校書戲成舊時天祿校書郎習氣薰人老未忘可笑當窗楮生面郤成宫額半塗黃病起始浴二首無數塵埃一病身不䝉湔拂幾經旬政須皂莢相料理可笑梁州陰子春欲著牀頭浣濯衣汗流成雨垢成泥呼兒為我供湯事今日身輕好杖藜雪後月窗戲題青女翻空一笑開天花散盡更徘徊嫦娥相與有瓜葛也向讀書窗下來題陸務觀草堂草堂人去客來遊竹筧泉鳴山更幽向使經營無陸子殘僧古寺不宜秋人日雪意埀埀體不佳十年人日寄天涯老來只有窮相守忍使奴星結柳車寒食日誦老杜示宗文宗武詩寄二子衰年寒食又清明欹枕詩成字不成欲寄宗文與宗武一春風雨大江橫春晴莫春已辦曾㸃服急雨又墊林宗巾一晴政為吾輩設速載家釀羞廚珍己巳歲夏旱大熱睡起偶成年年暑去皆有期今年暑去何遲遲不知搖敗幾團扇得到西風吹面時青天無雲日亭午羣巫禱祈且呼舞老夫饒睡昏昏然鼻息如雷汗如雨夏夜聞雨凉風急雨夜蕭蕭便恐江南草木雕自為豐年喜無寐不關窗外有芭蕉久雨小雨飛空十日餘苔錢稱意上階除芒鞋不踏門前路坐聽嘔啞過竹輿道中遇雨客子祈晴意未公林間布穀勸春農雨師若有分風手留取車輪一道通鄭顧道衝雨見過荷橐臨門門未開多泥窮巷遍蒼苔始知猶勝杜陵老舊雨客來今亦來九日二首尊前韻度落烏紗卻是西風識孟嘉當日龍山無數客問誰整整復斜斜儋耳重陽菊滿頭恰如佳月即中秋歸來唱著中原句卻道黃花蝶也愁雪晴未快溪橋踏雪心朝陽已復上遙岑可憐昨夜瓊瑤跡化作春泥尺許深鳳凰臺簫聲無復到層臺畫棟空餘燕雀來我是鳳凰池上客等閒汀鷺莫相猜疏山一覽亭青雲梯盡得朱欄不但令人六月寒無限江南好山水菴摩勒果掌中看鳴水驛一道溪流百轉深挼藍如色珮如音青蔬幾葉來何處知有幽人底事尋蘆溝橋輿馬連年東復西巨鼇雙脅夾青猊荷旃食肉無非命憔悴相如不敢題次奄中二陸韻問石尋泉到竹齊木犀花盡菊花開老僧有約君知否乘興前村雪裏來遊張公善權二洞四首此邦勝處名天下今日爭來入眼中笻杖一枝舟一葉山行衝雨水衝風縵纓乳蓋張公洞風馭雲軿定不無勿以衰翁作生客舊時相識選仙圖自疑身是洞中仙才出張公又善權只道石田無用處種成玉粒至今傳洞有仙人田米堆善權石狀說不盡怪怪竒竒驚倒人大屋修廊巖下路凄風冷雨洞中春禽聲四首勸我行沽聒晝眠看人爛醉買江天興來亦欲提壺去未有蘇公乞酒錢幽禽竟日引圓吭脫袴催人有底忙不但春天無衣著凄風冷雨絶須防春泥滑滑強知時野日荒荒已露機政與鵓鳩同一律朝來喚得阿姑歸有酒如淮肉如坻何如麥飯滑流匙但看此物豐登日即是儂家快活時三衢道中梅子黃時日日晴小溪泛盡卻山行緑陰不減來時路添得黃鸝四五聲途中二首鵓鳩晴雨報人知更問農家底事宜村落泥乾收麥地稻田水滿䅤秧時小麥青青大麥黃新蠶滿箔稻移秧緑陰馬倦休亭午芳草牛閒臥夕陽痁病七月四日愈作誰言似病元非病一日之間行四時不用文殊來問疾箇中實怕有人知老身危似草頭露疾勢來如江上潮寒熱自無安著處不然何以脫今朝詩催練裙染翰初不惜布袋寫真殊未來併作山房一奇事臨岐更著小詩催徐子禮為豫作石窟二字許明叔布袋和尚畫像未之得也一絶舉催道逢王左丞不及避謝之二首西風黃葉北門街有句無人為翦裁衝突前驅公㑹否要求一語定敲推黃童白叟趁虛回左轄車前撥不開記得緑槐陰御路萬人辟易繡鞍來獨步小園四首江梅落盡紅梅在百葉緗梅賸欲開園裏無人園外靜暗香引得數蜂來只道江梅發不遲最先零落使人悲從今穠李花千樹未抵前村雪一枝誰將山杏胭脂色來作江梅玉頰紅但得暗香疏影在不妨妝面對春風山衣重疊六銖輕淡拂槐花染不成報答春工選何物鵝兒黃酒十分傾書陸務觀所藏阿羅漢像一軸大阿羅漢十有六一一騰空見人足手持貝葉坐禪林稱不動尊惟我獨送李商叟秀才還臨川一春霧雨暗溪山城北城南斷往還政是晴時君又去望君煙艇有無間題天衣寺布襪青鞋踏欲無登山臨水未成疏十峰雙澗天衣寺萬壑千巖總不如再題天衣寺畫舫珠簾出繚牆天風吹到芰荷鄉水光入座杯盤瑩花氣侵人笑語香再過翠屏蠻荒乃有此巑岏石黛因依碧玉寒須信佳山如絶色憑誰貌取一生看求李生畫山水屛乞君山石洪濤句來作圍牀六幅屛持向嶺南煙雨裏夢成江上數峰青書左舉善秀才乞米圖乞米魯公書作帖睎顔處士畫成圖若教渾似侏儒飽還有流傳翰墨無書徐明叔訪戴圖小艇相從本不期剡中雪月並明時不因興盡回船去那得山陰一段奇乞貓二首春來鼠壤有餘蔬乞得貓奴亦已無青蒻裹鹽仍裹茗煩君為致小於菟江茗吳鹽雪不如更令女手綴紅􅔮與繻字同小詩卻缺涪翁句為問銜蟬聘得無木魚戲成緣木求魚卻得魚擊鮮日日向齊盂可憐鉤掛濠梁上大勝馮歡每食無怪石眼前突兀見此石怪怪奇奇俱可人為問何如潘騎省世間妍醜本非真竹奴因讀山谷竹奴腳婆詩戲作山谷既以竹夫人為竹奴余亦名腳婆為錫奴焉霧帳桃笙晝寢餘此君那可一朝無秋來冷落同班扇歲晚溫柔是錫奴緑毛龜若為介物成毛物顔色挼藍省見稀定是多生捕魚子至今猶著緑蓑衣白龜一種龜兒玉雪然故人為寄小如錢㑹當放汝江湖去小住盆池慰眼前茶山集卷八
